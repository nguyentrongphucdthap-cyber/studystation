<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StudyStation Test - Luyện thi Tiếng Anh Online</title>
    
    <!-- Font Be Vietnam Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Be Vietnam Pro"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3B82F6',
                        darkBg: '#0F172A',
                        success: '#10B981',
                        error: '#EF4444',
                        warning: '#F59E0B',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pop': 'pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 antialiased h-screen flex flex-col overflow-hidden selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">

    <!-- Header -->
    <header class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 h-14 lg:h-16 flex items-center justify-between px-3 lg:px-6 shrink-0 z-50 transition-colors duration-300">
        <!-- Left: Logo -->
        <div class="flex items-center gap-2 lg:gap-3 cursor-pointer group flex-shrink-0" onclick="app.goHome()">
            <div class="w-8 h-8 lg:w-9 lg:h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20 group-hover:scale-110 transition-transform duration-300">
                <i class="ph-bold ph-graduation-cap text-lg lg:text-xl"></i>
            </div>
            <span class="font-bold text-base lg:text-lg hidden md:block tracking-tight group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">StudyStation</span>
        </div>
        
        <!-- Center: Section Progress -->
        <div id="section-progress" class="hidden items-center gap-1 lg:gap-2 animate-fade-in justify-center flex-1 min-w-0 mx-2">
            <button onclick="app.prevSection()" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full disabled:opacity-30 disabled:cursor-not-allowed text-slate-500 transition-all active:scale-95 flex-shrink-0">
                <i class="ph-bold ph-caret-left"></i>
            </button>
            <span class="text-xs lg:text-sm font-bold text-slate-700 dark:text-slate-300 min-w-[80px] lg:min-w-[140px] text-center px-2 py-1 rounded-md bg-slate-100/50 dark:bg-slate-800/50 backdrop-blur-sm truncate" id="section-title-display">Phần 1/3</span>
            <button onclick="app.nextSection()" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full disabled:opacity-30 disabled:cursor-not-allowed text-slate-500 transition-all active:scale-95 flex-shrink-0">
                <i class="ph-bold ph-caret-right"></i>
            </button>
        </div>

        <div id="review-filters" class="hidden items-center gap-1 animate-fade-in justify-center flex-1">
            <button onclick="app.setReviewFilter('all')" class="filter-btn active px-2 lg:px-3 py-1.5 rounded-lg text-[10px] lg:text-xs font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">Tất cả</button>
            <button onclick="app.setReviewFilter('incorrect')" class="filter-btn px-2 lg:px-3 py-1.5 rounded-lg text-[10px] lg:text-xs font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center gap-1"><i class="ph-bold ph-x-circle hidden sm:inline"></i> Sai</button>
            <button onclick="app.setReviewFilter('correct')" class="filter-btn px-2 lg:px-3 py-1.5 rounded-lg text-[10px] lg:text-xs font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center gap-1"><i class="ph-bold ph-check-circle hidden sm:inline"></i> Đúng</button>
        </div>
        
        <!-- Right: Actions & Timer -->
        <div class="flex items-center justify-end gap-2 lg:gap-3 flex-shrink-0">
            <div id="exam-timer" class="hidden flex items-center gap-1 lg:gap-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-2 lg:px-3 py-1 lg:py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 font-mono font-bold text-xs lg:text-sm shadow-sm animate-fade-in">
                <i class="ph-fill ph-clock text-blue-500"></i>
                <span id="timer-display">00:00</span>
            </div>
            <button id="btn-close-review" onclick="app.goHome()" class="hidden text-slate-500 hover:text-slate-900 dark:hover:text-white font-medium text-xs lg:text-sm whitespace-nowrap">Đóng</button>
            <button id="btn-settings" onclick="app.toggleSettings(event)" class="w-8 h-8 lg:w-9 lg:h-9 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 transition-all hover:rotate-90">
                <i class="ph-bold ph-gear text-lg lg:text-xl"></i>
            </button>
            <button onclick="app.openSubmitModal()" id="btn-submit" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-3 lg:px-4 py-1.5 lg:py-2 rounded-lg text-xs lg:text-sm font-bold transition-all shadow-md shadow-blue-600/30 hover:shadow-lg active:translate-y-0.5 whitespace-nowrap">Nộp</button>
        </div>
    </header>

    <!-- Settings Panel -->
    <div id="settings-panel" class="hidden fixed top-16 right-4 w-72 lg:w-80 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-5 z-50 animate-pop origin-top-right">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-5">Hiển thị & Giao diện</h3>
        
        <!-- Dark Mode -->
        <div class="flex items-center justify-between mb-6 group cursor-pointer" onclick="app.toggleDarkMode()">
            <span class="font-medium flex items-center gap-3 text-slate-700 dark:text-slate-200">
                <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-blue-100 dark:group-hover:bg-blue-900 transition-colors"><i class="ph-fill ph-moon"></i></div>
                Chế độ tối
            </span>
            <div class="w-12 h-6 rounded-full bg-slate-200 dark:bg-blue-600 relative transition-colors duration-300">
                <div class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 dark:left-7 transition-all duration-300 shadow-sm"></div>
            </div>
        </div>

        <!-- Font Size Slider -->
        <div class="mb-6">
            <div class="flex justify-between mb-3">
                <span class="font-medium flex items-center gap-3 text-slate-700 dark:text-slate-200">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400"><i class="ph-fill ph-text-t"></i></div>
                    Cỡ chữ
                </span>
                <span id="font-size-val" class="text-sm text-blue-500 font-bold bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded">16px</span>
            </div>
            <input type="range" min="14" max="24" value="16" step="1" oninput="app.setFontSize(this.value)" class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600">
            <div class="flex justify-between text-xs text-slate-400 mt-2 font-medium"><span>Nhỏ</span><span>Lớn</span></div>
        </div>
        
         <!-- Line Height -->
         <div class="mb-2">
            <div class="flex justify-between mb-3">
                <span class="font-medium flex items-center gap-3 text-slate-700 dark:text-slate-200">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400"><i class="ph-fill ph-rows"></i></div>
                    Giãn dòng
                </span>
                <span id="line-height-val" class="text-sm text-blue-500 font-bold bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded">1.6</span>
            </div>
            <input type="range" min="1.0" max="3.0" step="0.1" value="1.6" oninput="app.setLineHeight(this.value)" class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600">
            <div class="flex justify-between text-xs text-slate-400 mt-2 font-medium"><span>Khít</span><span>Thoáng</span></div>
        </div>
    </div>

    <!-- Text Tools & Modals -->
    <div id="text-selection-menu" class="hidden bg-slate-800 dark:bg-white rounded-full shadow-2xl p-2 flex items-center gap-2 transform -translate-x-1/2 transition-all animate-pop ring-4 ring-black/5 dark:ring-white/10 absolute z-50">
        <button onclick="textTools.highlight('yellow')" class="w-6 h-6 rounded-full bg-yellow-300 hover:scale-125 transition-transform border border-slate-600/10 shadow-sm"></button>
        <button onclick="textTools.highlight('green')" class="w-6 h-6 rounded-full bg-green-300 hover:scale-125 transition-transform border border-slate-600/10 shadow-sm"></button>
        <button onclick="textTools.highlight('blue')" class="w-6 h-6 rounded-full bg-blue-300 hover:scale-125 transition-transform border border-slate-600/10 shadow-sm"></button>
        <button onclick="textTools.highlight('pink')" class="w-6 h-6 rounded-full bg-pink-300 hover:scale-125 transition-transform border border-slate-600/10 shadow-sm"></button>
        <button onclick="textTools.highlight('purple')" class="w-6 h-6 rounded-full bg-purple-300 hover:scale-125 transition-transform border border-slate-600/10 shadow-sm"></button>
        <div class="w-px h-5 bg-slate-600 dark:bg-slate-300 mx-1 opacity-50"></div>
        <button onclick="textTools.openNoteInput()" class="flex items-center gap-1 text-white dark:text-slate-800 px-2 py-1 rounded-full hover:bg-slate-700 dark:hover:bg-slate-200 transition-colors"><i class="ph-bold ph-text-t text-lg"></i><span class="text-xs font-bold">Ghi chú</span></button>
        <div class="tooltip-arrow"></div>
    </div>
    
    <div id="highlight-action-menu" class="hidden bg-slate-800 dark:bg-white rounded-lg shadow-xl p-1.5 flex flex-col gap-1 transform -translate-x-1/2 animate-pop origin-bottom absolute z-50">
         <button onclick="textTools.deleteHighlight()" class="flex items-center gap-2 text-white dark:text-red-600 px-3 py-1.5 rounded-md hover:bg-red-500/20 dark:hover:bg-red-50 text-xs font-bold transition-colors whitespace-nowrap"><i class="ph-bold ph-trash"></i> Xóa Highlight</button>
        <div class="tooltip-arrow"></div>
    </div>

    <div id="note-editor" class="hidden bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 p-3 w-72 animate-pop origin-bottom absolute z-50">
        <textarea id="note-input" rows="3" class="w-full text-sm p-2 rounded-lg bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none resize-none mb-2 text-slate-800 dark:text-slate-200" placeholder="Nhập nội dung thay thế..."></textarea>
        <div class="flex justify-end gap-2">
            <button onclick="textTools.closeNoteInput()" class="px-3 py-1.5 text-xs font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-md">Hủy</button>
            <button onclick="textTools.applyNote()" class="px-3 py-1.5 text-xs font-bold bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm">Lưu</button>
        </div>
    </div>

    <div id="submit-modal-overlay" class="hidden fixed inset-0 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-sm overflow-hidden animate-pop">
            <div class="bg-slate-50 dark:bg-slate-900/50 p-6 text-center border-b border-slate-100 dark:border-slate-700">
                <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4 animate-[bounce_1s_infinite]"><i class="ph-fill ph-paper-plane-right text-3xl ml-1"></i></div>
                <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Nộp bài thi?</h3>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Bạn đã hoàn thành <span id="modal-answered-count" class="font-bold text-blue-600">0</span>/<span id="modal-total-count">0</span> câu hỏi.</p>
            </div>
            <div class="p-6">
                <div class="flex flex-col gap-3">
                    <button onclick="app.confirmSubmit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all hover:-translate-y-1">Xác nhận nộp bài</button>
                    <button onclick="app.closeSubmitModal()" class="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-bold py-3 rounded-xl transition-colors">Tiếp tục làm bài</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main id="app-container" class="flex-1 overflow-hidden relative transition-all duration-300"></main>

    <!-- Bottom Nav -->
    <div id="bottom-nav" class="hidden bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-700 h-14 lg:h-16 shrink-0 flex items-center px-3 lg:px-4 gap-3 lg:gap-4 z-40 transition-transform duration-300 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
        <div class="flex items-center gap-2 lg:gap-3 overflow-x-auto custom-scroll flex-1 no-scrollbar px-2" id="question-bubbles"></div>
        <div class="border-l border-slate-200 dark:border-slate-700 pl-3 lg:pl-4 flex items-center text-[10px] lg:text-xs text-slate-500 font-medium whitespace-nowrap">
            <span id="completed-count" class="text-blue-600 font-bold text-base lg:text-lg mr-1">0</span> / <span id="total-count" class="text-sm lg:text-base">0</span>
        </div>
    </div>

    <!-- Templates -->
    <template id="tpl-home">
        <div class="h-full overflow-y-auto custom-scroll p-4 lg:p-10 bg-slate-50 dark:bg-darkBg animate-fade-in pb-safe">
            <div class="max-w-7xl mx-auto">
                <div class="mb-8 lg:mb-12 text-center pt-4 lg:pt-8">
                    <div class="inline-block p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-lg mb-4 lg:mb-6 animate-pop">
                        <i class="ph-fill ph-student text-4xl lg:text-5xl text-blue-600"></i>
                    </div>
                    <h1 class="text-3xl lg:text-5xl font-bold text-slate-900 dark:text-white mb-2 lg:mb-4 tracking-tight">StudyStation Test</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-base lg:text-lg max-w-2xl mx-auto leading-relaxed">Nền tảng thi thử tiếng Anh tối giản, tối ưu cho kỹ năng đọc hiểu và quản lý thời gian.</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 pb-20">
                    <!-- Cards ... (Same as before) -->
                    <div onclick="app.showExamList('thpt')" class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700/50 hover:border-blue-400 dark:hover:border-blue-500 cursor-pointer transition-all duration-300 shadow-sm hover:shadow-2xl group relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 dark:bg-blue-900/20 rounded-bl-[80px] -mr-6 -mt-6 transition-transform group-hover:scale-110"></div>
                        <div class="w-12 h-12 bg-blue-50 dark:bg-blue-900/30 rounded-xl flex items-center justify-center text-blue-600 mb-4 group-hover:scale-110 group-hover:rotate-3 transition-all duration-300 relative z-10 shadow-inner"><i class="ph-fill ph-exam text-2xl"></i></div>
                        <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white relative z-10">THPT QG</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-xs lg:text-sm mb-4 leading-relaxed relative z-10">Cấu trúc chuẩn 50 câu.</p>
                         <span class="text-[10px] lg:text-xs font-bold bg-blue-50 dark:bg-blue-900/40 px-2 lg:px-3 py-1 rounded-lg text-blue-600 dark:text-blue-400 relative z-10">50 câu</span>
                    </div>
                    
                    <div onclick="app.showExamList('dgnl')" class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700/50 hover:border-purple-400 dark:hover:border-purple-500 cursor-pointer transition-all duration-300 shadow-sm hover:shadow-2xl group relative overflow-hidden">
                         <div class="absolute top-0 right-0 w-24 h-24 bg-purple-50 dark:bg-purple-900/20 rounded-bl-[80px] -mr-6 -mt-6 transition-transform group-hover:scale-110"></div>
                        <div class="w-12 h-12 bg-purple-50 dark:bg-purple-900/30 rounded-xl flex items-center justify-center text-purple-600 mb-4 group-hover:scale-110 group-hover:-rotate-3 transition-all duration-300 relative z-10 shadow-inner"><i class="ph-fill ph-brain text-2xl"></i></div>
                        <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white relative z-10">ĐGNL</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-xs lg:text-sm mb-4 leading-relaxed relative z-10">Tư duy định lượng.</p>
                        <span class="text-[10px] lg:text-xs font-bold bg-purple-50 dark:bg-purple-900/40 px-2 lg:px-3 py-1 rounded-lg text-purple-600 dark:text-purple-400 relative z-10">Tổng hợp</span>
                    </div>
                    
                    <div onclick="app.showExamList('quiz')" class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700/50 hover:border-emerald-400 dark:hover:border-emerald-500 cursor-pointer transition-all duration-300 shadow-sm hover:shadow-2xl group relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-emerald-50 dark:bg-emerald-900/20 rounded-bl-[80px] -mr-6 -mt-6 transition-transform group-hover:scale-110"></div>
                       <div class="w-12 h-12 bg-emerald-50 dark:bg-emerald-900/30 rounded-xl flex items-center justify-center text-emerald-600 mb-4 group-hover:scale-110 group-hover:rotate-3 transition-all duration-300 relative z-10 shadow-inner"><i class="ph-fill ph-lightning text-2xl"></i></div>
                       <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white relative z-10">Mini Test</h3>
                       <p class="text-slate-500 dark:text-slate-400 text-xs lg:text-sm mb-4 leading-relaxed relative z-10">Kiểm tra nhanh 15p.</p>
                       <span class="text-[10px] lg:text-xs font-bold bg-emerald-50 dark:bg-emerald-900/40 px-2 lg:px-3 py-1 rounded-lg text-emerald-600 dark:text-emerald-400 relative z-10">Nhanh</span>
                   </div>

                   <div onclick="app.showExamList('topic_1')" class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700/50 hover:border-orange-400 dark:hover:border-orange-500 cursor-pointer transition-all duration-300 shadow-sm hover:shadow-2xl group relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-orange-50 dark:bg-orange-900/20 rounded-bl-[80px] -mr-6 -mt-6 transition-transform group-hover:scale-110"></div>
                       <div class="w-12 h-12 bg-orange-50 dark:bg-orange-900/30 rounded-xl flex items-center justify-center text-orange-600 mb-4 group-hover:scale-110 group-hover:-rotate-3 transition-all duration-300 relative z-10 shadow-inner"><i class="ph-fill ph-book-bookmark text-2xl"></i></div>
                       <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white relative z-10">Chủ đề 1</h3>
                       <p class="text-slate-500 dark:text-slate-400 text-xs lg:text-sm mb-4 leading-relaxed relative z-10">Life Stories That We Admire.</p>
                       <span class="text-[10px] lg:text-xs font-bold bg-orange-50 dark:bg-orange-900/40 px-2 lg:px-3 py-1 rounded-lg text-orange-600 dark:text-orange-400 relative z-10">Chuyên đề</span>
                   </div>
                </div>
            </div>
        </div>
    </template>
    
    <template id="tpl-result">
        <div class="h-full overflow-y-auto custom-scroll pb-safe">
            <div class="max-w-2xl mx-auto px-4 py-10 lg:py-16 text-center animate-slide-up">
                <div class="w-28 h-28 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-green-500/20 animate-[pop_0.5s_ease-out]"><i class="ph-fill ph-check-circle text-5xl"></i></div>
                <h2 class="text-4xl font-bold text-slate-900 dark:text-white mb-3">Hoàn thành bài thi!</h2>
                <p class="text-slate-500 dark:text-slate-400 mb-10 text-lg">Bạn đã nộp bài thành công. Dưới đây là kết quả chi tiết.</p>
                <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-10 shadow-xl mb-10 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
                    <div class="text-sm text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold mb-4">Điểm số (Thang 10)</div>
                    <div class="flex items-center justify-center mb-6"><span class="text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400" id="result-score">--</span></div>
                    <div class="grid grid-cols-3 gap-4 border-t border-slate-100 dark:border-slate-700 pt-6">
                        <div><div class="text-2xl font-bold text-green-500" id="result-correct">0</div><div class="text-xs text-slate-500 font-medium uppercase">Đúng</div></div>
                        <div><div class="text-2xl font-bold text-red-500" id="result-wrong">0</div><div class="text-xs text-slate-500 font-medium uppercase">Sai</div></div>
                        <div><div class="text-2xl font-bold text-slate-400" id="result-skipped">0</div><div class="text-xs text-slate-500 font-medium uppercase">Bỏ qua</div></div>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 justify-center pb-20">
                    <button onclick="app.reviewExam()" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all transform hover:-translate-y-1 shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2"><i class="ph-bold ph-eye"></i> Xem lại bài làm</button>
                    <button onclick="app.goHome()" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 px-8 py-4 rounded-xl font-bold hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2"><i class="ph-bold ph-house"></i> Về trang chủ</button>
                </div>
            </div>
        </div>
    </template>
