<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học sinh | Admin - StudyStation</title>
    <link rel="icon" type="image/png" href="../../../favicon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-red-50 min-h-screen">

    <!-- Gatekeeper Loading -->
    <div id="gatekeeper-loading"
        style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:none;justify-content:center;align-items:center;color:#ffffff;z-index:9999">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
            <img src="../../../favicon.png" alt="StudyStation" style="width:56px;height:56px;border-radius:12px">
            <div style="font-weight:700;font-size:18px">StudyStation Admin</div>
            <div style="font-size:14px;opacity:0.7">Đang xác thực...</div>
        </div>
    </div>

    <!-- Access Denied -->
    <div id="access-denied" class="hidden min-h-screen flex items-center justify-center">
        <div class="text-center p-8">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Không có quyền truy cập</h2>
            <p class="text-gray-500 mb-6">Bạn cần quyền <strong>Super-Admin</strong> để truy cập trang này.</p>
            <a href="../index.html"
                class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-colors">Quay
                lại</a>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3">
                        <a href="../index.html"
                            class="flex items-center gap-2 text-gray-500 hover:text-red-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                        </a>
                        <h1 class="text-xl font-bold text-gray-800">
                            <span class="text-red-500">👥</span> Quản lý Học sinh
                        </h1>
                    </div>
                    <div class="flex items-center gap-3">
                        <span id="admin-email" class="text-sm text-gray-500 hidden sm:block"></span>
                        <div
                            class="px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full border border-red-200">
                            SUPER ADMIN
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main -->
        <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                <!-- Header -->
                <div class="p-4 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="font-bold text-gray-800">Danh sách Người dùng</h2>
                            <p class="text-xs text-gray-500">Tài khoản được phép truy cập hệ thống</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="students-count"
                            class="px-2 py-1 bg-gray-100 text-gray-600 text-xs font-bold rounded-lg">0 users</span>
                        <button id="btn-refresh"
                            class="px-3 py-1.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            Refresh
                        </button>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="max-h-[70vh] overflow-y-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-4 py-3 text-left font-semibold text-gray-600">Email</th>
                                <th class="px-4 py-3 text-left font-semibold text-gray-600">Quyền</th>
                                <th class="px-4 py-3 text-left font-semibold text-gray-600">Đăng nhập lần cuối</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="3" class="px-4 py-8 text-center text-gray-400">
                                    <div class="flex flex-col items-center gap-2">
                                        <svg class="w-8 h-8 spinner text-blue-500" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                                stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor"
                                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                            </path>
                                        </svg>
                                        <span>Đang tải danh sách...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module">
        import {
            initGatekeeper,
            checkIsSuperAdmin,
            onUserChange,
            getAllAllowedUsers
        } from "../../../gatekeeper.js";

        const refs = {
            accessDenied: document.getElementById('access-denied'),
            mainContent: document.getElementById('main-content'),
            adminEmail: document.getElementById('admin-email'),
            studentsTableBody: document.getElementById('students-table-body'),
            studentsCount: document.getElementById('students-count'),
            btnRefresh: document.getElementById('btn-refresh')
        };

        // Format datetime to Vietnam timezone (UTC+7)
        function formatVietnamTime(isoString) {
            if (!isoString) return 'Chưa đăng nhập';
            try {
                const date = new Date(isoString);
                return date.toLocaleString('vi-VN', {
                    timeZone: 'Asia/Ho_Chi_Minh',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            } catch {
                return isoString;
            }
        }

        // Get role badge HTML
        function getRoleBadge(role) {
            const roleLower = (role || 'user').toLowerCase();
            if (roleLower.includes('super-admin')) {
                return '<span class="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full">Super Admin</span>';
            } else if (roleLower.includes('admin')) {
                return '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">Admin</span>';
            } else {
                return '<span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs font-bold rounded-full">User</span>';
            }
        }

        // Load and render students list
        async function loadStudents() {
            refs.studentsTableBody.innerHTML = `
                <tr>
                    <td colspan="3" class="px-4 py-8 text-center text-gray-400">
                        <div class="flex flex-col items-center gap-2">
                            <svg class="w-8 h-8 spinner text-blue-500" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span>Đang tải danh sách...</span>
                        </div>
                    </td>
                </tr>
            `;

            try {
                const users = await getAllAllowedUsers();

                // Sort by last_login (most recent first)
                users.sort((a, b) => {
                    const dateA = a.last_login ? new Date(a.last_login) : new Date(0);
                    const dateB = b.last_login ? new Date(b.last_login) : new Date(0);
                    return dateB - dateA;
                });

                refs.studentsCount.textContent = `${users.length} users`;

                if (users.length === 0) {
                    refs.studentsTableBody.innerHTML = `
                        <tr>
                            <td colspan="3" class="px-4 py-8 text-center text-gray-400">
                                Chưa có người dùng nào
                            </td>
                        </tr>
                    `;
                    return;
                }

                refs.studentsTableBody.innerHTML = users.map(user => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-sm">
                                    ${(user.email || 'U')[0].toUpperCase()}
                                </div>
                                <span class="font-medium text-gray-800">${user.email || user.id}</span>
                            </div>
                        </td>
                        <td class="px-4 py-3">
                            ${getRoleBadge(user.role)}
                        </td>
                        <td class="px-4 py-3 text-gray-500">
                            ${formatVietnamTime(user.last_login)}
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Load students failed:', error);
                refs.studentsTableBody.innerHTML = `
                    <tr>
                        <td colspan="3" class="px-4 py-8 text-center text-red-500">
                            Lỗi: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        // Init
        initGatekeeper('protected');

        onUserChange(async (user) => {
            if (!user) return;

            setTimeout(() => {
                // Check SUPER-ADMIN access (not just admin)
                if (!checkIsSuperAdmin()) {
                    refs.accessDenied.classList.remove('hidden');
                    return;
                }

                refs.adminEmail.textContent = user.email;
                refs.mainContent.classList.remove('hidden');

                // Load students
                loadStudents();

                // Bind refresh
                refs.btnRefresh.addEventListener('click', loadStudents);
            }, 500);
        });
    </script>

</body>

</html>
