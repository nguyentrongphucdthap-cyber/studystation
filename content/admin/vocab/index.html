<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Vocab | Admin - StudyStation</title>
    <link rel="icon" type="image/png" href="../../../favicon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-emerald-50 min-h-screen">

    <!-- Gatekeeper Loading -->
    <div id="gatekeeper-loading"
        style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:none;justify-content:center;align-items:center;color:#ffffff;z-index:9999">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
            <img src="../../../favicon.png" alt="StudyStation" style="width:56px;height:56px;border-radius:12px">
            <div style="font-weight:700;font-size:18px">StudyStation Admin</div>
            <div style="font-size:14px;opacity:0.7">Đang xác thực...</div>
        </div>
    </div>

    <!-- Access Denied -->
    <div id="access-denied" class="hidden min-h-screen flex items-center justify-center">
        <div class="text-center p-8">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Không có quyền truy cập</h2>
            <p class="text-gray-500 mb-6">Bạn cần quyền Admin để truy cập trang này.</p>
            <a href="../index.html"
                class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-colors">Quay
                lại</a>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3">
                        <a href="../index.html"
                            class="flex items-center gap-2 text-gray-500 hover:text-emerald-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                        </a>
                        <h1 class="text-xl font-bold text-gray-800">
                            <span class="text-emerald-500">📚</span> Quản lý Vocab
                        </h1>
                    </div>
                    <div class="flex items-center gap-3">
                        <span id="admin-email" class="text-sm text-gray-500 hidden sm:block"></span>
                        <div
                            class="px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full border border-emerald-200">
                            VOCAB
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main -->
        <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-12 text-center">
                <div class="w-20 h-20 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-3">Quản lý Vocab</h2>
                <p class="text-gray-500 mb-6 max-w-md mx-auto">
                    Tạo và quản lý các bộ từ vựng. Tính năng này sẽ sử dụng Firebase collection <code
                        class="px-2 py-0.5 bg-gray-100 rounded text-sm">vocab_sets</code>
                </p>
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-amber-100 text-amber-700 rounded-xl">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span class="font-semibold">🚧 Đang phát triển...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initGatekeeper, checkIsAdmin, onUserChange } from "../../../gatekeeper.js";

        const refs = {
            accessDenied: document.getElementById('access-denied'),
            mainContent: document.getElementById('main-content'),
            adminEmail: document.getElementById('admin-email')
        };

        initGatekeeper('protected');

        onUserChange(async (user) => {
            if (!user) return;

            setTimeout(() => {
                if (!checkIsAdmin()) {
                    refs.accessDenied.classList.remove('hidden');
                    return;
                }

                refs.adminEmail.textContent = user.email;
                refs.mainContent.classList.remove('hidden');
            }, 500);
        });
    </script>

</body>

</html>
