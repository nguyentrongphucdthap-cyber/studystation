<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thông báo - StudyStation Admin</title>
    <link rel="icon" type="image/png" href="../../../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .toast-enter {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Access Denied -->
    <div id="access-denied" class="hidden min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Không có quyền truy cập</h2>
            <p class="text-gray-500 mb-4">Bạn cần quyền Admin để xem trang này.</p>
            <a href="../index.html" class="text-blue-600 hover:underline">← Quay lại Admin Panel</a>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <a href="../index.html" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                        </a>
                        <div>
                            <h1 class="text-xl font-bold text-gray-800">Quản lý Thông báo</h1>
                            <p class="text-sm text-gray-500">Tạo và chỉnh sửa thông báo hiển thị trên trang chủ</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="admin-email" class="text-sm text-gray-500 hidden md:block"></span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main -->
        <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Add Notification Form -->
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden mb-6">
                <div class="p-4 border-b border-gray-100 bg-blue-50">
                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Thêm Thông báo mới
                    </h3>
                </div>
                <div class="p-4">
                    <form id="add-notification-form" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Tiêu đề <span
                                        class="text-red-500">*</span></label>
                                <input type="text" id="notif-title"
                                    class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                    placeholder="Tiêu đề thông báo" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Tác giả</label>
                                <input type="text" id="notif-author"
                                    class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                    placeholder="Tên người đăng">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nội dung <span
                                    class="text-red-500">*</span></label>
                            <textarea id="notif-content" rows="3"
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none"
                                placeholder="Nội dung thông báo..." required></textarea>
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="notif-is-new" checked
                                    class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="text-sm text-gray-700">Đánh dấu là thông báo mới</span>
                            </label>
                            <button type="submit"
                                class="px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4" />
                                </svg>
                                Thêm thông báo
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Notifications List -->
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="font-bold text-gray-800">Danh sách Thông báo</h2>
                            <p id="notifications-count" class="text-xs text-gray-500">Đang tải...</p>
                        </div>
                    </div>
                    <button id="btn-refresh"
                        class="px-3 py-1.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Làm mới
                    </button>
                </div>
                <div id="notifications-list" class="divide-y divide-gray-100">
                    <div class="p-8 text-center text-gray-400">
                        <svg class="w-8 h-8 mx-auto mb-2 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Đang tải danh sách...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-800 text-center mb-2">Xóa thông báo?</h3>
            <p id="delete-notif-title" class="text-gray-500 text-sm text-center mb-6">Thông báo này sẽ bị xóa vĩnh viễn.
            </p>
            <div class="flex gap-3">
                <button id="btn-cancel-delete"
                    class="flex-1 px-4 py-2.5 border border-gray-200 text-gray-600 font-semibold rounded-xl hover:bg-gray-50 transition-colors">Hủy</button>
                <button id="btn-confirm-delete"
                    class="flex-1 px-4 py-2.5 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition-colors">Xóa</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import {
            initGatekeeper,
            checkIsAdmin,
            onUserChange,
            getAllNotifications,
            createNotification,
            updateNotification,
            deleteNotification
        } from "../../../gatekeeper.js";

        let currentDeleteId = null;
        let currentUser = null;

        const refs = {
            accessDenied: document.getElementById('access-denied'),
            mainContent: document.getElementById('main-content'),
            adminEmail: document.getElementById('admin-email'),
            notificationsList: document.getElementById('notifications-list'),
            notificationsCount: document.getElementById('notifications-count'),
            btnRefresh: document.getElementById('btn-refresh'),
            toastContainer: document.getElementById('toast-container'),
            // Add Form
            addForm: document.getElementById('add-notification-form'),
            notifTitle: document.getElementById('notif-title'),
            notifContent: document.getElementById('notif-content'),
            notifAuthor: document.getElementById('notif-author'),
            notifIsNew: document.getElementById('notif-is-new'),
            // Delete Modal
            deleteModal: document.getElementById('delete-modal'),
            deleteNotifTitle: document.getElementById('delete-notif-title'),
            btnCancelDelete: document.getElementById('btn-cancel-delete'),
            btnConfirmDelete: document.getElementById('btn-confirm-delete')
        };

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            toast.className = `${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-enter max-w-sm`;
            toast.innerHTML = `
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'success'
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
                </svg>
                <span class="text-sm font-medium">${message}</span>
            `;
            refs.toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Format date
        function formatDate(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Load notifications
        async function loadNotifications() {
            refs.notificationsList.innerHTML = `
                <div class="p-8 text-center text-gray-400">
                    <svg class="w-8 h-8 mx-auto mb-2 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Đang tải...
                </div>
            `;

            try {
                const notifications = await getAllNotifications();
                refs.notificationsCount.textContent = `${notifications.length} thông báo`;

                if (notifications.length === 0) {
                    refs.notificationsList.innerHTML = `
                        <div class="p-8 text-center text-gray-400">
                            <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                            <p>Chưa có thông báo nào</p>
                        </div>
                    `;
                    return;
                }

                refs.notificationsList.innerHTML = notifications.map(notif => `
                    <div class="p-4 hover:bg-gray-50 transition-colors" data-id="${notif.id}">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    ${notif.isNew ? '<span class="px-2 py-0.5 bg-red-100 text-red-700 text-xs font-bold rounded">MỚI</span>' : ''}
                                    <span class="text-xs text-gray-400">${formatDate(notif.createdAt)}</span>
                                    <span class="text-xs text-gray-400">• ${notif.author || 'Ẩn danh'}</span>
                                </div>
                                <h3 class="font-bold text-gray-800 mb-1">${notif.title}</h3>
                                <p class="text-sm text-gray-600 line-clamp-2">${notif.content}</p>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <button class="btn-toggle-new p-2 hover:bg-blue-50 rounded-lg transition-colors text-blue-600" data-id="${notif.id}" data-is-new="${notif.isNew}" title="${notif.isNew ? 'Bỏ đánh dấu mới' : 'Đánh dấu mới'}">
                                    <svg class="w-4 h-4" fill="${notif.isNew ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                                    </svg>
                                </button>
                                <button class="btn-delete p-2 hover:bg-red-50 rounded-lg transition-colors text-red-600" data-id="${notif.id}" data-title="${notif.title}" title="Xóa">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Bind toggle events
                refs.notificationsList.querySelectorAll('.btn-toggle-new').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        const isNew = btn.dataset.isNew === 'true';
                        try {
                            await updateNotification(id, { isNew: !isNew });
                            showToast(isNew ? 'Đã bỏ đánh dấu mới' : 'Đã đánh dấu là mới');
                            loadNotifications();
                        } catch (error) {
                            showToast('Lỗi: ' + error.message, 'error');
                        }
                    });
                });

                // Bind delete events
                refs.notificationsList.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentDeleteId = btn.dataset.id;
                        refs.deleteNotifTitle.textContent = `Xóa "${btn.dataset.title}"?`;
                        refs.deleteModal.classList.remove('hidden');
                    });
                });

            } catch (error) {
                console.error('Load notifications failed:', error);
                refs.notificationsList.innerHTML = `
                    <div class="p-8 text-center text-red-500">
                        Lỗi: ${error.message}
                    </div>
                `;
            }
        }

        // Add notification
        async function handleAddNotification(e) {
            e.preventDefault();

            const title = refs.notifTitle.value.trim();
            const content = refs.notifContent.value.trim();
            const author = refs.notifAuthor.value.trim() || (currentUser?.displayName || currentUser?.email?.split('@')[0] || 'Admin');
            const isNew = refs.notifIsNew.checked;

            if (!title || !content) {
                showToast('Vui lòng nhập tiêu đề và nội dung', 'error');
                return;
            }

            try {
                await createNotification({ title, content, author, isNew });
                showToast('Đã tạo thông báo mới');
                refs.notifTitle.value = '';
                refs.notifContent.value = '';
                refs.notifAuthor.value = '';
                refs.notifIsNew.checked = true;
                loadNotifications();
            } catch (error) {
                showToast('Lỗi: ' + error.message, 'error');
            }
        }

        // Delete notification
        async function handleDeleteNotification() {
            if (!currentDeleteId) return;

            refs.deleteModal.classList.add('hidden');

            try {
                await deleteNotification(currentDeleteId);
                showToast('Đã xóa thông báo');
                currentDeleteId = null;
                loadNotifications();
            } catch (error) {
                showToast('Lỗi: ' + error.message, 'error');
            }
        }

        // Init
        initGatekeeper('protected');

        onUserChange(async (user) => {
            if (!user) return;
            currentUser = user;

            setTimeout(() => {
                if (!checkIsAdmin()) {
                    refs.accessDenied.classList.remove('hidden');
                    return;
                }

                refs.adminEmail.textContent = user.email;
                refs.mainContent.classList.remove('hidden');

                loadNotifications();

                refs.btnRefresh.addEventListener('click', loadNotifications);
                refs.addForm.addEventListener('submit', handleAddNotification);
                refs.btnCancelDelete.addEventListener('click', () => {
                    refs.deleteModal.classList.add('hidden');
                    currentDeleteId = null;
                });
                refs.btnConfirmDelete.addEventListener('click', handleDeleteNotification);
            }, 500);
        });
    </script>
</body>

</html>
