<!DOCTYPE html>
<html lang="vi" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus Timer (Protected)</title>
    <link rel="icon" type="image/png" href="../../favicon.png">

    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tải Tone.js để tạo âm thanh (báo thức, tiếng ồn) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- Tải phông chữ Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* [GATEKEEPER] Hiển thị trang, overlay sẽ che nội dung khi kiểm tra quyền */
        body {}

        /* [GATEKEEPER] Màn hình chờ khi đang kiểm tra quyền */
        #gatekeeper-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            /* Màu nền tối cho hợp theme */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        /* [GATEKEEPER] Nút đăng xuất nhỏ ở góc trên phải */
        #gatekeeper-logout-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 100;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        #gatekeeper-logout-btn:hover {
            background: rgba(239, 68, 68, 0.8);
            color: white;
        }

        /* --- CSS CŨ CỦA POMODORO --- */
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        @keyframes gradient-move {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body {
            background: linear-gradient(-45deg, #1d2b64, #0f172a, #0d1a26, #111827);
            background-size: 400% 400%;
            animation: gradient-move 15s ease infinite;
        }

        body.custom-background {
            background-image: var(--custom-bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            animation: none;
        }

        .tab-btn.active {
            background-color: #ffffff;
            color: #111827;
        }

        .nav-icon-btn.active {
            background-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 0 15px 0 rgba(59, 130, 246, 0.5);
        }

        .sound-btn.active {
            background-color: #3b82f6;
            box-shadow: 0 0 15px 0 rgba(59, 130, 246, 0.5);
        }

        main.timer-active #timer-display {
            font-size: 4.5rem;
            line-height: 1;
            transition: font-size 0.4s ease-in-out;
        }

        @media (min-width: 768px) {
            main.timer-active #timer-display {
                font-size: 6rem;
            }
        }

        main.timer-active #task-input {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
            transition: all 0.4s ease-in-out;
        }

        input[type=range].volume-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
        }

        input[type=range].volume-slider:focus {
            outline: none;
        }

        input[type=range].volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            width: 14px;
            background-color: #ffffff;
            border-radius: 50%;
            border: none;
            margin-top: -5px;
        }

        input[type=range].volume-slider::-moz-range-thumb {
            height: 14px;
            width: 14px;
            background-color: #ffffff;
            border-radius: 50%;
            border: none;
        }

        input[type=range].volume-slider::-webkit-slider-runnable-track {
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        input[type=range].volume-slider::-moz-range-track {
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .media-tab-btn.active {
            background-color: #3b82f6;
            color: #ffffff;
        }

        .bg-tab-btn.active {
            background-color: #3b82f6;
            color: #ffffff;
        }

        .media-list-item,
        .bg-list-item {
            display: block;
            width: 100%;
            padding: 8px 10px;
            font-size: 0.8rem;
            color: #d1d5db;
            border-radius: 6px;
            transition: background-color 0.2s;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
        }

        .media-list-item:hover,
        .bg-list-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .media-list-item .code {
            font-weight: 600;
            color: #ffffff;
            margin-right: 6px;
        }

        .bg-list-item .icon {
            margin-right: 8px;
        }

        #video-popup-panel.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5) translateX(200px);
            transition: all 0.3s ease-out;
        }

        #video-popup-panel {
            transition: all 0.3s ease-out;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen text-white p-4 overflow-hidden">

    <!-- [GATEKEEPER] MÀN HÌNH LOADING -->
    <div id="gatekeeper-loading">
        <img src="../../favicon.png" alt="StudyStation"
            style="width:56px;height:56px;border-radius:12px;margin-bottom:12px">
        <h3 class="text-xl font-bold">StudyStation</h3>
        <div class="spinner"></div>
    </div>

    <!-- [GATEKEEPER] NÚT ĐĂNG XUẤT -->
    <button id="gatekeeper-logout-btn">Log Out</button>

    <!-- NỘI DUNG CHÍNH CỦA POMODORO -->
    <div class="w-full max-w-md mx-auto my-10">
        <main id="main-content"
            class="bg-black/20 backdrop-blur-xl rounded-2xl p-6 md:p-8 shadow-2xl border border-white/10 transition-all duration-300">
            <!-- Tabs -->
            <div class="bg-black/30 p-1.5 rounded-full flex justify-between items-center space-x-1 mb-8">
                <button id="focus-btn"
                    class="tab-btn active w-full py-2 px-4 rounded-full text-sm font-semibold transition-all duration-300">Focus</button>
                <button id="short-break-btn"
                    class="tab-btn w-full py-2 px-4 rounded-full text-sm font-semibold text-gray-300 hover:bg-white/10 transition-all duration-300">Short
                    Break</button>
                <button id="long-break-btn"
                    class="tab-btn w-full py-2 px-4 rounded-full text-sm font-semibold text-gray-300 hover:bg-white/10 transition-all duration-300">Long
                    Break</button>
            </div>

            <!-- Timer -->
            <div class="text-center my-10 md:my-12 transition-all duration-300">
                <h1 id="timer-display"
                    class="text-8xl md:text-9xl font-extrabold tracking-tighter transition-all duration-400 ease-in-out">
                    25:00</h1>
            </div>

            <!-- Input -->
            <input type="text" id="task-input" placeholder="What are you working on?"
                class="w-full bg-transparent border-b-2 border-white/20 focus:border-white/50 text-center text-lg p-2 outline-none placeholder:text-gray-400 mb-6 transition-all duration-400 ease-in-out">

            <!-- Start Button -->
            <button id="start-pause-btn"
                class="w-full bg-white text-gray-900 py-4 px-6 rounded-xl text-2xl font-bold shadow-lg transition-all duration-300 transform hover:scale-105 hover:shadow-2xl active:scale-95">Start</button>
        </main>
    </div>

    <!-- Navi Icons -->
    <nav class="fixed bottom-4 left-4 z-50 flex flex-row space-x-2">
        <button id="toggle-sounds-btn"
            class="nav-icon-btn w-14 h-14 bg-black/30 backdrop-blur-lg border border-white/10 text-2xl rounded-full flex items-center justify-center text-gray-300 hover:bg-white/20 transition-all duration-300">🌧️</button>
        <button id="toggle-media-btn"
            class="nav-icon-btn w-14 h-14 bg-black/30 backdrop-blur-lg border border-white/10 text-2xl rounded-full flex items-center justify-center text-gray-300 hover:bg-white/20 transition-all duration-300">🎵</button>
        <button id="toggle-background-btn"
            class="nav-icon-btn w-14 h-14 bg-black/30 backdrop-blur-lg border border-white/10 text-2xl rounded-full flex items-center justify-center text-gray-300 hover:bg-white/20 transition-all duration-300">🖼️</button>
    </nav>

    <!-- Sounds Panel -->
    <div id="sounds-panel"
        class="fixed bottom-20 left-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg p-4 shadow-lg hidden w-72">
        <h3 class="text-center text-sm font-medium text-gray-300 mb-5">Ambient Sounds</h3>
        <div class="flex flex-col space-y-3">
            <!-- White Noise -->
            <div class="flex items-center space-x-3">
                <button data-sound="white"
                    class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">🤍<span
                        class="block text-xs mt-1">White</span></button>
                <input type="range" data-sound="white" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            <!-- Pink Noise -->
            <div class="flex items-center space-x-3">
                <button data-sound="pink"
                    class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">🩷<span
                        class="block text-xs mt-1">Pink</span></button>
                <input type="range" data-sound="pink" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            <!-- Brown Noise -->
            <div class="flex items-center space-x-3">
                <button data-sound="brown"
                    class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">🤎<span
                        class="block text-xs mt-1">Brown</span></button>
                <input type="range" data-sound="brown" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            <!-- Sine -->
            <div class="flex items-center space-x-3">
                <button data-sound="sine"
                    class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">〰️<span
                        class="block text-xs mt-1">Sine</span></button>
                <input type="range" data-sound="sine" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            <!-- Triangle -->
            <div class="flex items-center space-x-3">
                <button data-sound="triangle"
                    class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">🔺<span
                        class="block text-xs mt-1">Triangle</span></button>
                <input type="range" data-sound="triangle" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            <!-- Sawtooth -->
            <div class="flex items-center space-x-3">
                <button data-sound="sawtooth"
                    class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">📈<span
                        class="block text-xs mt-1">Saw</span></button>
                <input type="range" data-sound="sawtooth" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
        </div>
    </div>

    <!-- Media Panel -->
    <div id="media-panel"
        class="fixed bottom-20 left-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg p-4 shadow-lg w-full max-w-xs hidden">
        <div class="bg-black/30 p-1 rounded-full flex justify-between items-center space-x-1 mb-4">
            <button data-tab="custom"
                class="media-tab-btn active w-full py-1.5 px-2 rounded-full text-xs font-semibold">Custom</button>
            <button data-tab="album"
                class="media-tab-btn w-full py-1.5 px-2 rounded-full text-xs font-semibold text-gray-300 hover:bg-white/10">Album</button>
            <button data-tab="history"
                class="media-tab-btn w-full py-1.5 px-2 rounded-full text-xs font-semibold text-gray-300 hover:bg-white/10">History</button>
        </div>
        <div id="media-tab-custom" class="media-tab-content">
            <div class="flex space-x-2 mb-2">
                <input type="text" id="media-url-input" placeholder="Paste a YouTube URL"
                    class="flex-grow bg-black/30 text-white p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-gray-400">
                <button id="load-media-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all">Load</button>
            </div>
        </div>
        <div id="media-tab-album" class="media-tab-content hidden max-h-48 overflow-y-auto"></div>
        <div id="media-tab-history" class="media-tab-content hidden max-h-48 overflow-y-auto"></div>
    </div>

    <!-- Video Popup -->
    <div id="video-popup-panel"
        class="fixed bottom-4 right-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg shadow-lg w-full max-w-md hidden">
        <button id="close-video-popup-btn"
            class="absolute -top-2 -right-2 z-50 w-7 h-7 bg-black/70 rounded-full text-white flex items-center justify-center text-lg font-bold leading-none pb-0.5 hover:bg-red-500 transition-colors">&times;</button>
        <div id="media-player-container"
            class="video-wrapper aspect-video w-full rounded-lg overflow-hidden bg-black/30"></div>
    </div>

    <!-- Background Panel -->
    <div id="background-panel"
        class="fixed bottom-20 left-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg p-4 shadow-lg w-full max-w-xs hidden">
        <h3 class="text-center text-sm font-medium text-gray-300 mb-4">Đổi Nền</h3>
        <div class="bg-black/30 p-1 rounded-full flex justify-between items-center space-x-1 mb-4">
            <button data-tab="custom"
                class="bg-tab-btn active w-full py-1.5 px-2 rounded-full text-xs font-semibold">Custom</button>
            <button data-tab="album"
                class="bg-tab-btn w-full py-1.5 px-2 rounded-full text-xs font-semibold text-gray-300 hover:bg-white/10">Album</button>
        </div>
        <div id="bg-tab-custom" class="bg-tab-content space-y-3">
            <input type="text" id="bg-url-input" placeholder="Paste an image/GIF URL"
                class="w-full bg-black/30 text-white p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-gray-400">
            <button id="set-bg-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all">Đặt
                Nền</button>
            <button id="reset-bg-btn"
                class="w-full bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all">Khôi
                Phục</button>
        </div>
        <div id="bg-tab-album" class="bg-tab-content hidden max-h-48 overflow-y-auto"></div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 hidden"
        style="z-index: 1000;">
        <div class="bg-gray-800 rounded-lg p-6 shadow-xl w-full max-w-sm text-center">
            <h3 class="text-lg font-semibold mb-2">Thông báo</h3>
            <p id="error-message" class="text-gray-300 mb-4">URL YouTube không hợp lệ.</p>
            <button id="close-error-modal-btn"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all">Đã
                hiểu</button>
        </div>
    </div>

    <!-- [GATEKEEPER] LOGIC BẢO VỆ -->
    <script type="module">
        // Import từ thư mục cha 2 cấp (../../)
        import { initGatekeeper, logoutUser, startPresence } from "../../gatekeeper.js";

        // Kích hoạt chế độ bảo vệ trang nội dung
        initGatekeeper('protected_page');

        // Start presence tracking for online users counter
        startPresence();

        // Gán sự kiện cho nút đăng xuất (nút mới tạo)
        document.getElementById('gatekeeper-logout-btn').addEventListener('click', logoutUser);
    </script>

    <!-- JS CHÍNH CỦA POMODORO (Giữ nguyên) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const timerDisplay = document.getElementById('timer-display');
            const startPauseBtn = document.getElementById('start-pause-btn');
            const taskInput = document.getElementById('task-input');
            const mainContent = document.getElementById('main-content');

            const focusBtn = document.getElementById('focus-btn');
            const shortBreakBtn = document.getElementById('short-break-btn');
            const longBreakBtn = document.getElementById('long-break-btn');
            const tabButtons = [focusBtn, shortBreakBtn, longBreakBtn];

            const soundToggleButtons = document.querySelectorAll('.sound-btn');
            const volumeSliders = document.querySelectorAll('.volume-slider');

            const toggleSoundsBtn = document.getElementById('toggle-sounds-btn');
            const toggleMediaBtn = document.getElementById('toggle-media-btn');
            const toggleBackgroundBtn = document.getElementById('toggle-background-btn');
            const soundsPanel = document.getElementById('sounds-panel');
            const mediaPanel = document.getElementById('media-panel');
            const backgroundPanel = document.getElementById('background-panel');

            const mediaUrlInput = document.getElementById('media-url-input');
            const loadMediaBtn = document.getElementById('load-media-btn');
            const mediaPlayerContainer = document.getElementById('media-player-container');
            const videoPopupPanel = document.getElementById('video-popup-panel');
            const closeVideoPopupBtn = document.getElementById('close-video-popup-btn');

            const errorModal = document.getElementById('error-modal');
            const errorMessage = document.getElementById('error-message');
            const closeErrorModalBtn = document.getElementById('close-error-modal-btn');

            const bgUrlInput = document.getElementById('bg-url-input');
            const setBgBtn = document.getElementById('set-bg-btn');
            const resetBgBtn = document.getElementById('reset-bg-btn');
            const bodyEl = document.body;

            const mediaTabButtons = document.querySelectorAll('.media-tab-btn');
            const mediaTabContents = document.querySelectorAll('.media-tab-content');
            const mediaTabAlbum = document.getElementById('media-tab-album');
            const mediaTabHistory = document.getElementById('media-tab-history');

            const bgTabButtons = document.querySelectorAll('.bg-tab-btn');
            const bgTabContents = document.querySelectorAll('.bg-tab-content');
            const bgTabAlbum = document.getElementById('bg-tab-album');

            // Constants
            const MEDIA_ALBUM = [
                { code: "#001", title: "Midnight Vale", url: "https://www.youtube.com/watch?v=_QqabGYTSpQ&list=RD_QqabGYTSpQ&start_radio=1" },
                { code: "#002", title: "Forest Sounds", url: "https://www.youtube.com/watch?v=xNN7iTA57jM" },
                { code: "#003", title: "Cozy Reading Nook", url: "https://www.youtube.com/watch?v=6bPN0JyGfA4" },
                { code: "#004", title: "minecraft music w/ soft rain", url: "https://www.youtube.com/watch?v=yJ6Lbsmb1lY&list=RDyJ6Lbsmb1lY&start_radio=1&t=11s" },
                { code: "#005", title: "Âm Thanh Thư Viện", url: "https://www.youtube.com/watch?v=4vIQON2fDWM" },
                { code: "#006", title: "2 giờ thời kỳ La Mã", url: "https://www.youtube.com/watch?v=4ki-fRm0O_w&list=RD4ki-fRm0O_w&start_radio=1" },
                { code: "#007", title: "Interstellar Space Journey", url: "https://www.youtube.com/watch?v=8wLwxmjrZj8&list=RD8wLwxmjrZj8&start_radio=1" },
                { code: "#008", title: "Synthwave Mix", url: "https://www.youtube.com/watch?v=4xDzrQpsdeY" },

            const BACKGROUND_ALBUM = [

                { title: "BMW M4 Art", url: "https://applescoop.org/image/wallpapers/mac/bmw-m4-m-series-artwork-4k-01-11-2024-1730444935-hd-wallpaper.jpg" },
                { title: "Ferrari 499P", url: "https://pixelz.cc/wp-content/uploads/2024/01/ferrari-499p-le-mans-hypercar-uhd-4k-wallpaper.jpg" },
                { title: "Colorful Sky", url: "https://cdn.wallpapersafari.com/63/56/izoh9I.jpg" },
                { title: "Peace", url: "https://64.media.tumblr.com/5d37ab2aa782462c7aa092f7bd0d27cb/2f374d07287b003b-f4/s1280x1920/fe094893d79e09d668e1705e8b9144964f38ce75.gif" }
            ];

            const MEDIA_HISTORY_KEY = 'pomodoroMediaHistory';

            // Timer State
            const timerModes = { focus: 25 * 60, short: 5 * 60, long: 15 * 60 };
            let currentMode = 'focus';
            let timeRemaining = timerModes.focus;
            let isRunning = false;
            let timerId = null;
            let longBreakInterval = 4;
            let focusCount = 0;

            // Audio
            let alarmSynth = null;
            let noisePlayers = {};

            function setupAudio() {
                alarmSynth = new Tone.Synth().toDestination();
                noisePlayers = {
                    white: new Tone.Noise("white").set({ volume: -Infinity }),
                    pink: new Tone.Noise("pink").set({ volume: -Infinity }),
                    brown: new Tone.Noise("brown").set({ volume: -Infinity }),
                    sine: new Tone.Oscillator("C2", "sine").set({ volume: -Infinity }),
                    triangle: new Tone.Oscillator("C2", "triangle").set({ volume: -Infinity }),
                    sawtooth: new Tone.Oscillator("C2", "sawtooth").set({ volume: -Infinity }),
                };
                Object.values(noisePlayers).forEach(player => {
                    player.toDestination();
                    player.start();
                });
            }

            async function startAudioContext() {
                if (Tone.context.state !== 'running') {
                    await Tone.start();
                }
            }

            function updateDisplay() {
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                const displayString = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                timerDisplay.textContent = displayString;
                document.title = `${displayString} - ${currentMode.charAt(0).toUpperCase() + currentMode.slice(1)}`;
            }

            function startTimer() {
                startAudioContext();
                isRunning = true;
                startPauseBtn.textContent = 'Pause';
                mainContent.classList.add('timer-active');
                timerId = setInterval(() => {
                    timeRemaining--;
                    updateDisplay();
                    if (timeRemaining <= 0) {
                        stopTimer();
                        playAlarm();
                        if (currentMode === 'focus') {
                            focusCount++;
                            if (focusCount % longBreakInterval === 0) switchMode('long');
                            else switchMode('short');
                        } else {
                            switchMode('focus');
                        }
                        startTimer();
                    }
                }, 1000);
            }

            function stopTimer() {
                clearInterval(timerId);
                timerId = null;
                isRunning = false;
                startPauseBtn.textContent = 'Start';
                mainContent.classList.remove('timer-active');
            }

            function playAlarm() {
                startAudioContext();
                if (alarmSynth) {
                    alarmSynth.triggerAttackRelease("C5", "8n", Tone.now());
                    alarmSynth.triggerAttackRelease("G5", "8n", Tone.now() + 0.2);
                }
            }

            function switchMode(mode) {
                if (isRunning) stopTimer();
                currentMode = mode;
                timeRemaining = timerModes[mode];
                updateDisplay();
                mainContent.classList.remove('timer-active');
                tabButtons.forEach(btn => {
                    if (btn.id.startsWith(mode)) {
                        btn.classList.add('active');
                        btn.classList.remove('text-gray-300', 'hover:bg-white/10');
                    } else {
                        btn.classList.remove('active');
                        btn.classList.add('text-gray-300', 'hover:bg-white/10');
                    }
                });
            }

            function toggleSound(soundType) {
                startAudioContext();
                const player = noisePlayers[soundType];
                const btn = document.querySelector(`.sound-btn[data-sound="${soundType}"]`);
                const slider = document.querySelector(`.volume-slider[data-sound="${soundType}"]`);

                if (btn.classList.contains('active')) {
                    player.volume.rampTo(-Infinity, 0.1);
                    slider.value = 0;
                    btn.classList.remove('active');
                } else {
                    const defaultSliderVal = 75;
                    slider.value = defaultSliderVal;
                    setSoundVolume(soundType, defaultSliderVal);
                    btn.classList.add('active');
                }
            }

            function setSoundVolume(soundType, sliderValue) {
                const player = noisePlayers[soundType];
                const btn = document.querySelector(`.sound-btn[data-sound="${soundType}"]`);
                const value = parseInt(sliderValue, 10);
                if (value === 0) {
                    player.volume.rampTo(-Infinity, 0.1);
                    btn.classList.remove('active');
                } else {
                    const newVolumeDb = (value * 0.5) - 50;
                    player.volume.rampTo(newVolumeDb, 0.1);
                    btn.classList.add('active');
                }
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorModal.classList.remove('hidden');
                errorModal.classList.add('flex');
            }

            function hideError() {
                errorModal.classList.add('hidden');
                errorModal.classList.remove('flex');
            }

            function getYouTubeEmbedUrl(url) {
                let videoId = null;
                try {
                    const urlObj = new URL(url);
                    const hostname = urlObj.hostname;
                    const pathname = urlObj.pathname;
                    if (hostname === 'youtu.be') videoId = pathname.split('/')[1];
                    else if (hostname.includes('youtube.com')) {
                        if (pathname.includes('/watch')) videoId = urlObj.searchParams.get('v');
                        else if (pathname.includes('/shorts/')) videoId = pathname.split('/shorts/')[1].split('?')[0];
                        else if (pathname.includes('/embed/')) videoId = pathname.split('/embed/')[1].split('?')[0];
                    }
                } catch (e) { }

                if (!videoId) {
                    const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|shorts)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/ ]{11})/;
                    const match = url.match(regex);
                    if (match) videoId = match[1];
                }
                if (videoId) return `https://www.youtube.com/embed/${videoId.substring(0, 11)}?autoplay=1&mute=1`;
                return null;
            }

            function loadMedia() {
                const url = mediaUrlInput.value.trim();
                if (!url) return;
                const embedUrl = getYouTubeEmbedUrl(url);
                if (!embedUrl) {
                    showError("URL YouTube không hợp lệ.");
                    return;
                }
                loadYouTubeIframe(embedUrl);
                addMediaToHistory(url);
                mediaUrlInput.value = '';
            }

            function loadYouTubeIframe(embedUrl) {
                mediaPlayerContainer.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.src = embedUrl;
                iframe.className = "w-full h-full";
                iframe.frameBorder = "0";
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;
                mediaPlayerContainer.appendChild(iframe);
                videoPopupPanel.classList.remove('hidden');
                mediaPanel.classList.add('hidden');
                toggleMediaBtn.classList.remove('active');
            }

            function loadMediaFromList(url) {
                const embedUrl = getYouTubeEmbedUrl(url);
                if (embedUrl) {
                    loadYouTubeIframe(embedUrl);
                    addMediaToHistory(url);
                } else showError("Link đã lưu không hợp lệ.");
            }

            function getMediaHistory() {
                try {
                    const history = localStorage.getItem(MEDIA_HISTORY_KEY);
                    return history ? JSON.parse(history) : [];
                } catch (e) { return []; }
            }

            function addMediaToHistory(url) {
                let history = getMediaHistory();
                history = history.filter(item => item.url !== url);
                history.unshift({ url: url });
                history = history.slice(0, 10);
                localStorage.setItem(MEDIA_HISTORY_KEY, JSON.stringify(history));
                if (mediaTabHistory && !mediaTabHistory.classList.contains('hidden')) populateMediaHistory();
            }

            function populateMediaAlbum() {
                mediaTabAlbum.innerHTML = '';
                MEDIA_ALBUM.forEach(item => {
                    const el = document.createElement('button');
                    el.className = 'media-list-item';
                    el.innerHTML = `<span class="code">${item.code}</span> ${item.title}`;
                    el.onclick = () => loadMediaFromList(item.url);
                    mediaTabAlbum.appendChild(el);
                });
            }

            function populateMediaHistory() {
                mediaTabHistory.innerHTML = '';
                const history = getMediaHistory();
                if (history.length === 0) {
                    mediaTabHistory.innerHTML = '<span class="media-list-item" style="cursor: default; opacity: 0.7;">Chưa có lịch sử</span>';
                    return;
                }
                history.forEach(item => {
                    const el = document.createElement('button');
                    el.className = 'media-list-item';
                    el.textContent = item.url;
                    el.title = item.url;
                    el.onclick = () => loadMediaFromList(item.url);
                    mediaTabHistory.appendChild(el);
                });
            }

            function setBackground(url) {
                if (!url) return;
                const img = new Image();
                img.onload = () => {
                    bodyEl.style.setProperty('--custom-bg-image', `url(${url})`);
                    bodyEl.classList.add('custom-background');
                    localStorage.setItem('pomodoroBgUrl', url);
                    backgroundPanel.classList.add('hidden');
                    toggleBackgroundBtn.classList.remove('active');
                };
                img.onerror = () => showError("Không thể tải hình ảnh. Kiểm tra URL.");
                img.src = url;
            }

            function resetBackground() {
                bodyEl.style.removeProperty('--custom-bg-image');
                bodyEl.classList.remove('custom-background');
                localStorage.removeItem('pomodoroBgUrl');
                bgUrlInput.value = '';
            }

            function populateBackgroundAlbum() {
                bgTabAlbum.innerHTML = '';
                BACKGROUND_ALBUM.forEach(item => {
                    const el = document.createElement('button');
                    el.className = 'bg-list-item';
                    el.innerHTML = `<span class="icon">${item.url.includes('gif') ? '🎞️' : '🖼️'}</span> ${item.title}`;
                    el.onclick = () => setBackground(item.url);
                    bgTabAlbum.appendChild(el);
                });
            }

            // Event Listeners
            startPauseBtn.addEventListener('click', () => isRunning ? stopTimer() : startTimer());
            focusBtn.addEventListener('click', () => switchMode('focus'));
            shortBreakBtn.addEventListener('click', () => switchMode('short'));
            longBreakBtn.addEventListener('click', () => switchMode('long'));
            soundToggleButtons.forEach(btn => btn.addEventListener('click', () => toggleSound(btn.dataset.sound)));
            volumeSliders.forEach(slider => slider.addEventListener('input', (e) => setSoundVolume(e.target.dataset.sound, e.target.value)));
            loadMediaBtn.addEventListener('click', loadMedia);
            closeVideoPopupBtn.addEventListener('click', () => videoPopupPanel.classList.add('hidden'));
            closeErrorModalBtn.addEventListener('click', hideError);

            const navButtons = [
                { btn: toggleSoundsBtn, panel: soundsPanel },
                { btn: toggleMediaBtn, panel: mediaPanel },
                { btn: toggleBackgroundBtn, panel: backgroundPanel }
            ];
            navButtons.forEach(item => {
                item.btn.addEventListener('click', () => {
                    const wasHidden = item.panel.classList.contains('hidden');
                    navButtons.forEach(i => {
                        i.panel.classList.add('hidden');
                        i.btn.classList.remove('active');
                    });
                    if (item.btn !== toggleMediaBtn) videoPopupPanel.classList.add('hidden');
                    if (wasHidden) {
                        item.panel.classList.remove('hidden');
                        item.btn.classList.add('active');
                    }
                });
            });

            mediaTabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.dataset.tab;
                    mediaTabContents.forEach(content => content.classList.add('hidden'));
                    mediaTabButtons.forEach(btn => {
                        btn.classList.remove('active');
                        btn.classList.add('text-gray-300', 'hover:bg-white/10');
                    });
                    document.getElementById(`media-tab-${tabId}`).classList.remove('hidden');
                    button.classList.add('active');
                    button.classList.remove('text-gray-300', 'hover:bg-white/10');
                    if (tabId === 'history') populateMediaHistory();
                });
            });

            bgTabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.dataset.tab;
                    bgTabContents.forEach(content => content.classList.add('hidden'));
                    bgTabButtons.forEach(btn => {
                        btn.classList.remove('active');
                        btn.classList.add('text-gray-300', 'hover:bg-white/10');
                    });
                    document.getElementById(`bg-tab-${tabId}`).classList.remove('hidden');
                    button.classList.add('active');
                    button.classList.remove('text-gray-300', 'hover:bg-white/10');
                });
            });

            setBgBtn.addEventListener('click', () => setBackground(bgUrlInput.value.trim()));
            resetBgBtn.addEventListener('click', resetBackground);

            // Init
            setupAudio();
            updateDisplay();
            populateMediaAlbum();
            populateMediaHistory();
            populateBackgroundAlbum();
            const savedBgUrl = localStorage.getItem('pomodoroBgUrl');
            if (savedBgUrl) setBackground(savedBgUrl);
            setTimeout(() => {
                document.querySelector('.media-tab-btn[data-tab="custom"]').click();
                document.querySelector('.bg-tab-btn[data-tab="custom"]').click();
            }, 0);
        });
    </script>
</body>

</html>
