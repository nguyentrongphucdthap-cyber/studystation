<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus Timer</title>
    
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tải Tone.js để tạo âm thanh (báo thức, tiếng ồn) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <!-- Tải phông chữ Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Sử dụng phông chữ Inter làm mặc định */
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative; /* [MỚI] Cần thiết cho các panel nổi */
        }

        /* Hiệu ứng nền gradient chuyển động */
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            background: linear-gradient(-45deg, #1d2b64, #0f172a, #0d1a26, #111827);
            background-size: 400% 400%;
            animation: gradient-move 15s ease infinite;
        }

        /* [MỚI] CSS cho nền tùy chỉnh */
        body.custom-background {
            /* JS sẽ đặt biến --custom-bg-image */
            background-image: var(--custom-bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Giữ nền cố định khi cuộn */
            animation: none; /* Tắt hoạt ảnh gradient */
        }

        /* Kiểu cho nút đang hoạt động (tab) */
        .tab-btn.active {
            background-color: #ffffff;
            color: #111827;
        }
        
        /* [ĐÃ SỬA] Kiểu cho nút icon navi đang hoạt động */
        .nav-icon-btn.active {
            background-color: #3b82f6; /* Blue-500 */
            color: #ffffff;
            box-shadow: 0 0 15px 0 rgba(59, 130, 246, 0.5);
        }

        /* Kiểu cho nút âm thanh đang hoạt động */
        .sound-btn.active {
            background-color: #3b82f6; /* Blue-500 */
            box-shadow: 0 0 15px 0 rgba(59, 130, 246, 0.5);
        }

        /* [XÓA] Quy tắc ẩn media cũ đã bị xóa */

        /* [MỚI] CSS để thu nhỏ đồng hồ khi đang chạy */
        main.timer-active #timer-display {
            /* Thu nhỏ từ text-8xl/9xl xuống 6xl/7xl */
            font-size: 4.5rem; /* 72px */
            line-height: 1;
            transition: font-size 0.4s ease-in-out;
        }
        @media (min-width: 768px) {
            main.timer-active #timer-display {
                font-size: 6rem; /* 96px */
            }
        }
        
        main.timer-active #task-input {
            /* Ẩn input công việc đi */
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
            transition: all 0.4s ease-in-out;
        }

        /* [MỚI] Tùy chỉnh thanh trượt âm lượng */
        input[type=range].volume-slider {
             -webkit-appearance: none;
             appearance: none;
             background: transparent;
             cursor: pointer;
             width: 100%;
        }
        input[type=range].volume-slider:focus {
            outline: none;
        }
        /* Thumb (con trượt) */
        input[type=range].volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            width: 14px;
            background-color: #ffffff;
            border-radius: 50%;
            border: none;
            margin-top: -5px; /* Căn giữa con trượt với track */
        }
        input[type=range].volume-slider::-moz-range-thumb {
            height: 14px;
            width: 14px;
            background-color: #ffffff;
            border-radius: 50%;
            border: none;
        }
        /* Track (đường chạy) */
        input[type=range].volume-slider::-webkit-slider-runnable-track {
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }
        input[type=range].volume-slider::-moz-range-track {
             height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }
        
        /* [MỚI] Kiểu cho nút media tab */
        .media-tab-btn.active {
            background-color: #3b82f6; /* Blue-500 */
            color: #ffffff;
        }

        /* [MỚI] Kiểu cho nút bg tab */
        .bg-tab-btn.active {
            background-color: #3b82f6; /* Blue-500 */
            color: #ffffff;
        }
        
        /* [MỚI] Kiểu cho danh sách album/history */
        .media-list-item, .bg-list-item {
            display: block;
            width: 100%;
            padding: 8px 10px;
            font-size: 0.8rem; /* 13px */
            color: #d1d5db; /* text-gray-300 */
            border-radius: 6px;
            transition: background-color 0.2s;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left; /* Căn trái */
        }
        .media-list-item:hover, .bg-list-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .media-list-item .code {
            font-weight: 600;
            color: #ffffff;
            margin-right: 6px;
        }
        .bg-list-item .icon {
            margin-right: 8px;
        }

        /* [MỚI] CSS để ẩn pop-up video nhưng giữ âm thanh */
        #video-popup-panel.hidden {
            /* Dùng opacity và pointer-events để ẩn nó khỏi tương tác */
            /* nhưng vẫn giữ nó trong DOM để âm thanh tiếp tục phát */
            opacity: 0;
            pointer-events: none;
            /* Di chuyển nó ra khỏi màn hình để đảm bảo an toàn */
            transform: scale(0.5) translateX(200px);
            transition: all 0.3s ease-out;
        }
        #video-popup-panel {
            transition: all 0.3s ease-out;
        }

    </style>
</head>
<body class="min-h-screen text-white p-4 overflow-hidden">

    <!-- [ĐÃ SỬA] Thẻ (card) hẹn giờ chính, thêm ID -->
    <div class="w-full max-w-md mx-auto my-10">
        <!-- Bộ chứa chính với hiệu ứng "Glassmorphism" -->
        <main id="main-content" class="bg-black/20 backdrop-blur-xl rounded-2xl p-6 md:p-8 shadow-2xl border border-white/10 transition-all duration-300">
            
            <!-- Các tab chọn chế độ (Pomodoro, Short Break, Long Break) -->
            <div class="bg-black/30 p-1.5 rounded-full flex justify-between items-center space-x-1 mb-8">
                <button id="focus-btn" class="tab-btn active w-full py-2 px-4 rounded-full text-sm font-semibold transition-all duration-300">
                    Focus
                </button>
                <button id="short-break-btn" class="tab-btn w-full py-2 px-4 rounded-full text-sm font-semibold text-gray-300 hover:bg-white/10 transition-all duration-300">
                    Short Break
                </button>
                <button id="long-break-btn" class="tab-btn w-full py-2 px-4 rounded-full text-sm font-semibold text-gray-300 hover:bg-white/10 transition-all duration-300">
                    Long Break
                </button>
            </div>

            <!-- Hiển thị thời gian -->
            <div class ="text-center my-10 md:my-12 transition-all duration-300">
                <h1 id="timer-display" class="text-8xl md:text-9xl font-extrabold tracking-tighter transition-all duration-400 ease-in-out">
                    25:00
                </h1>
            </div>

            <!-- Input công việc -->
            <input 
                type="text" 
                id="task-input"
                placeholder="What are you working on?"
                class="w-full bg-transparent border-b-2 border-white/20 focus:border-white/50 text-center text-lg p-2 outline-none placeholder:text-gray-400 mb-6 transition-all duration-400 ease-in-out"
            >

            <!-- Nút Start/Pause -->
            <button id="start-pause-btn" class="w-full bg-white text-gray-900 py-4 px-6 rounded-xl text-2xl font-bold shadow-lg transition-all duration-300 transform hover:scale-105 hover:shadow-2xl active:scale-95">
                Start
            </button>
            
        </main>
    </div>

    <!-- [MỚI] Thanh Navi Icon Cố Định -->
    <nav class="fixed bottom-4 left-4 z-50 flex flex-row space-x-2">
        <button id="toggle-sounds-btn" class="nav-icon-btn w-14 h-14 bg-black/30 backdrop-blur-lg border border-white/10 text-2xl rounded-full flex items-center justify-center text-gray-300 hover:bg-white/20 transition-all duration-300">
            🌧️
        </button>
        <button id="toggle-media-btn" class="nav-icon-btn w-14 h-14 bg-black/30 backdrop-blur-lg border border-white/10 text-2xl rounded-full flex items-center justify-center text-gray-300 hover:bg-white/20 transition-all duration-300">
            🎵
        </button>
        <!-- [MỚI] Nút đổi hình nền -->
        <button id="toggle-background-btn" class="nav-icon-btn w-14 h-14 bg-black/30 backdrop-blur-lg border border-white/10 text-2xl rounded-full flex items-center justify-center text-gray-300 hover:bg-white/20 transition-all duration-300">
            🖼️
        </button>
    </nav>

    <!-- [ĐÃ SỬA] Panel Âm thanh (Panel Nổi) - Thiết kế lại hoàn toàn -->
    <div id="sounds-panel" class="fixed bottom-20 left-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg p-4 shadow-lg hidden w-72">
        <h3 class="text-center text-sm font-medium text-gray-300 mb-5">Ambient Sounds</h3>
        <div class="flex flex-col space-y-3">
            
            <!-- Sound Item 1: White Noise -->
            <div class="flex items-center space-x-3">
                <button data-sound="white" class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">
                    🤍
                    <span class="block text-xs mt-1">White</span>
                </button>
                <input type="range" data-sound="white" min="0" max="100" value="0" class="volume-slider w-full">
            </div>

            <!-- Sound Item 2: Pink Noise -->
            <div class="flex items-center space-x-3">
                <button data-sound="pink" class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">
                    🩷
                    <span class="block text-xs mt-1">Pink</span>
                </button>
                <input type="range" data-sound="pink" min="0" max="100" value="0" class="volume-slider w-full">
            </div>

            <!-- Sound Item 3: Brown Noise -->
            <div class="flex items-center space-x-3">
                <button data-sound="brown" class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">
                    🤎
                    <span class="block text-xs mt-1">Brown</span>
                </button>
                <input type="range" data-sound="brown" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            
            <!-- [MỚI] Sound Item 4: Sine Wave -->
            <div class="flex items-center space-x-3">
                <button data-sound="sine" class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">
                    〰️
                    <span class="block text-xs mt-1">Sine</span>
                </button>
                <input type="range" data-sound="sine" min="0" max="100" value="0" class="volume-slider w-full">
            </div>
            
            <!-- [MỚI] Sound Item 5: Triangle Wave -->
            <div class="flex items-center space-x-3">
                <button data-sound="triangle" class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">
                    🔺
                    <span class="block text-xs mt-1">Triangle</span>
                </button>
                <input type="range" data-sound="triangle" min="0" max="100" value="0" class="volume-slider w-full">
            </div>

            <!-- [MỚI] Sound Item 6: Sawtooth Wave -->
            <div class="flex items-center space-x-3">
                <!-- [SỬA LỖI] Thay thế text 'sawtooth' bằng emoji -->
                <button data-sound="sawtooth" class="sound-btn bg-black/30 p-2 rounded-lg text-xl transition-all duration-300 hover:bg-white/20 w-16">
                    📈
                    <span class="block text-xs mt-1">Saw</span>
                </button>
                <input type="range" data-sound="sawtooth" min="0" max="100" value="0" class="volume-slider w-full">
            </div>

        </div>
    </div>

    <!-- [ĐÃ SỬA] Panel Media (Panel Nổi) - Giao diện Tab mới -->
    <div id="media-panel" class="fixed bottom-20 left-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg p-4 shadow-lg w-full max-w-xs hidden">
        
        <!-- Tab buttons -->
        <div class="bg-black/30 p-1 rounded-full flex justify-between items-center space-x-1 mb-4">
            <button data-tab="custom" class="media-tab-btn active w-full py-1.5 px-2 rounded-full text-xs font-semibold">Custom</button>
            <button data-tab="album" class="media-tab-btn w-full py-1.5 px-2 rounded-full text-xs font-semibold text-gray-300 hover:bg-white/10">Album</button>
            <button data-tab="history" class="media-tab-btn w-full py-1.5 px-2 rounded-full text-xs font-semibold text-gray-300 hover:bg-white/10">History</button>
        </div>

        <!-- Tab Content: Custom URL -->
        <div id="media-tab-custom" class="media-tab-content">
            <!-- [ĐÃ XÓA] Tiêu đề "Media Player" -->
            <div class="flex space-x-2 mb-2">
                <input 
                    type="text" 
                    id="media-url-input"
                    placeholder="Paste a YouTube URL"
                    class="flex-grow bg-black/30 text-white p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-gray-400"
                >
                <button 
                    id="load-media-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
                >
                    Load
                </button>
            </div>
        </div>

        <!-- [MỚI] Tab Content: Album -->
        <div id="media-tab-album" class="media-tab-content hidden max-h-48 overflow-y-auto">
            <!-- Album items sẽ được chèn bằng JS -->
        </div>

        <!-- [MỚI] Tab Content: History -->
        <div id="media-tab-history" class="media-tab-content hidden max-h-48 overflow-y-auto">
            <!-- History items sẽ được chèn bằng JS -->
        </div>

        <!-- [ĐÃ XÓA] Video Player (đã di chuyển ra ngoài) -->
    </div>

    <!-- [MỚI] Pop-up Trình phát Video (Kích thước lớn hơn) -->
    <div id="video-popup-panel" class="fixed bottom-4 right-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg shadow-lg w-full max-w-md hidden">
        <!-- [MỚI] Nút Đóng 'X' -->
        <button id="close-video-popup-btn" class="absolute -top-2 -right-2 z-50 w-7 h-7 bg-black/70 rounded-full text-white flex items-center justify-center text-lg font-bold leading-none pb-0.5 hover:bg-red-500 transition-colors">&times;</button>
        
        <!-- [ĐÃ SỬA] Video Player (đã di chuyển) -->
        <div id="media-player-container" class="video-wrapper aspect-video w-full rounded-lg overflow-hidden bg-black/30">
            <!-- Iframe sẽ được chèn vào đây bằng JS -->
        </div>
    </div>


    <!-- [ĐÃ SỬA] Panel Đổi Nền (Thêm Tabs) -->
    <div id="background-panel" class="fixed bottom-20 left-4 z-40 bg-black/50 backdrop-blur-lg rounded-lg p-4 shadow-lg w-full max-w-xs hidden">
        <h3 class="text-center text-sm font-medium text-gray-300 mb-4">Đổi Nền</h3>
        
        <!-- [MỚI] Tab buttons -->
        <div class="bg-black/30 p-1 rounded-full flex justify-between items-center space-x-1 mb-4">
            <!-- [SỬA LỖI] Đổi data-tab từ "bg-custom" -> "custom" -->
            <button data-tab="custom" class="bg-tab-btn active w-full py-1.5 px-2 rounded-full text-xs font-semibold">Custom</button>
            <!-- [SỬA LỖI] Đổi data-tab từ "bg-album" -> "album" -->
            <button data-tab="album" class="bg-tab-btn w-full py-1.5 px-2 rounded-full text-xs font-semibold text-gray-300 hover:bg-white/10">Album</button>
        </div>

        <!-- [MỚI] Tab Content: Custom -->
        <!-- [SỬA LỖI] Đổi ID từ "bg-tab-custom" -> "bg-custom" (để khớp logic) -->
        <div id="bg-tab-custom" class="bg-tab-content space-y-3">
            <input 
                type="text" 
                id="bg-url-input"
                placeholder="Paste an image/GIF URL"
                class="w-full bg-black/30 text-white p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-gray-400"
            >
            <button 
                id="set-bg-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
            >
                Đặt Nền
            </button>
            <button 
                id="reset-bg-btn"
                class="w-full bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all"
            >
                Khôi Phục
            </button>
        </div>

        <!-- [MỚI] Tab Content: Album -->
        <!-- [SỬA LỖI] Đổi ID từ "bg-tab-album" -> "bg-album" (để khớp logic) -->
        <div id="bg-tab-album" class="bg-tab-content hidden max-h-48 overflow-y-auto">
            <!-- Album nền sẽ được chèn bằng JS -->
        </div>
    </div>


    <!-- Modal thông báo lỗi -->
    <div id="error-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 hidden" style="z-index: 1000;">
        <div class="bg-gray-800 rounded-lg p-6 shadow-xl w-full max-w-sm text-center">
            <h3 class="text-lg font-semibold mb-2">Thông báo</h3>
            <p id="error-message" class="text-gray-300 mb-4">URL YouTube không hợp lệ.</p>
            <button id="close-error-modal-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all">
                Đã hiểu
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const timerDisplay = document.getElementById('timer-display');
            const startPauseBtn = document.getElementById('start-pause-btn');
            const taskInput = document.getElementById('task-input');
            const mainContent = document.getElementById('main-content'); // [MỚI]
            
            const focusBtn = document.getElementById('focus-btn');
            const shortBreakBtn = document.getElementById('short-break-btn');
            const longBreakBtn = document.getElementById('long-break-btn');
            const tabButtons = [focusBtn, shortBreakBtn, longBreakBtn];

            // [ĐÃ SỬA] Lấy các nút và thanh trượt âm thanh mới
            const soundToggleButtons = document.querySelectorAll('.sound-btn');
            const volumeSliders = document.querySelectorAll('.volume-slider');

            // [ĐÃ SỬA] Các nút navi và panel nổi
            const toggleSoundsBtn = document.getElementById('toggle-sounds-btn');
            const toggleMediaBtn = document.getElementById('toggle-media-btn');
            const toggleBackgroundBtn = document.getElementById('toggle-background-btn'); // [MỚI]
            const soundsPanel = document.getElementById('sounds-panel');
            const mediaPanel = document.getElementById('media-panel');
            const backgroundPanel = document.getElementById('background-panel'); // [MỚI]
            
            const mediaUrlInput = document.getElementById('media-url-input');
            const loadMediaBtn = document.getElementById('load-media-btn');
            const mediaPlayerContainer = document.getElementById('media-player-container');
            const videoPopupPanel = document.getElementById('video-popup-panel'); // [MỚI]
            const closeVideoPopupBtn = document.getElementById('close-video-popup-btn'); // [MỚI]
            
            // Modal elements
            const errorModal = document.getElementById('error-modal');
            const errorMessage = document.getElementById('error-message');
            const closeErrorModalBtn = document.getElementById('close-error-modal-btn');
            
            // [MỚI] Element cho nền
            const bgUrlInput = document.getElementById('bg-url-input');
            const setBgBtn = document.getElementById('set-bg-btn');
            const resetBgBtn = document.getElementById('reset-bg-btn');
            const bodyEl = document.body;
            
            // [MỚI] Media Tabs
            const mediaTabButtons = document.querySelectorAll('.media-tab-btn');
            const mediaTabContents = document.querySelectorAll('.media-tab-content');
            const mediaTabAlbum = document.getElementById('media-tab-album');
            const mediaTabHistory = document.getElementById('media-tab-history');

            // [MỚI] Background Tabs
            const bgTabButtons = document.querySelectorAll('.bg-tab-btn');
            const bgTabContents = document.querySelectorAll('.bg-tab-content');
            const bgTabAlbum = document.getElementById('bg-tab-album');

            // --- [MỚI] Constants ---
            const MEDIA_ALBUM = [
            { code: "#001", title: "Midnight Vale", url: "https://www.youtube.com/watch?v=_QqabGYTSpQ&list=RD_QqabGYTSpQ&start_radio=1" },
                { code: "#002", title: "Forest Sounds", url: "https://www.youtube.com/watch?v=xNN7iTA57jM" },
                { code: "#003", title: "Cozy Reading Nook", url: "https://www.youtube.com/watch?v=6bPN0JyGfA4" },
                { code: "#004", title: "minecraft music w/ soft rain", url: "https://www.youtube.com/watch?v=yJ6Lbsmb1lY&list=RDyJ6Lbsmb1lY&start_radio=1&t=11s" },
                { code: "#005", title: "Âm Thanh Thư Viện", url: "https://www.youtube.com/watch?v=4vIQON2fDWM" },
                { code: "#006", title: "2 giờ thời kỳ La Mã", url: "https://www.youtube.com/watch?v=4ki-fRm0O_w&list=RD4ki-fRm0O_w&start_radio=1" },
                { code: "#007", title: "Interstellar Space Journey", url: "https://www.youtube.com/watch?v=8wLwxmjrZj8&list=RD8wLwxmjrZj8&start_radio=1" },
                { code: "#008", title: "Synthwave Mix", url: "https://www.youtube.com/watch?v=4xDzrQpsdeY" },
                { code: "#009", title: "Lofi hip-hop", url: "https://www.youtube.com/watch?v=lTRiuFIWV54" },
                { code: "#010", title: "✨Alpha Waves", url: "https://www.youtube.com/watch?v=WPni755-Krg&list=RDWPni755-Krg&start_radio=1" },
                { code: "#011", title: "ADHD Relief", url: "https://www.youtube.com/watch?v=RG2IK8oRZNA" },
                { code: "#012", title: "Zero Distractions", url: "https://www.youtube.com/watch?v=0w80F8FffQ4&list=RD0w80F8FffQ4&start_radio=1" },
                { code: "#013", title: "Lofi Beats Mix", url: "https://www.youtube.com/watch?v=a-i-eGg-qY4" },
                { code: "#014", title: "Classical Study", url: "https://www.youtube.com/watch?v=WJ3-F02-F_c" },
                { code: "#015", title: "Ambient Space", url: "https://www.youtube.com/watch?v=66tqU_oIL-k" },
                { code: "#016", title: "Synthwave Mix", url: "https://www.youtube.com/watch?v=4xDzrQpsdeY" }
            ];
            
            const BACKGROUND_ALBUM = [
                { title: "(GIF) Starfall Night Sky Mountains", url: "https://wallpapers-clan.com/wp-content/uploads/2024/03/starfall-night-sky-mountains-aesthetic-gif-preview-desktop-wallpaper.gif" },

                { title: "(GIF) Orange Forest", url: "https://i.pinimg.com/originals/d7/33/34/d733345e4f11231904e7634a04439e21.gif" },
                { title: "BMW M4 Art", url: "https://applescoop.org/image/wallpapers/mac/bmw-m4-m-series-artwork-4k-01-11-2024-1730444935-hd-wallpaper.jpg" },
                { title: "Ferrari 499P", url: "https://pixelz.cc/wp-content/uploads/2024/01/ferrari-499p-le-mans-hypercar-uhd-4k-wallpaper.jpg" },
                { title: "Colorful Sky", url: "https://cdn.wallpapersafari.com/63/56/izoh9I.jpg" },
                { title: "Peace", url: "https://64.media.tumblr.com/5d37ab2aa782462c7aa092f7bd0d27cb/2f374d07287b003b-f4/s1280x1920/fe094893d79e09d668e1705e8b9144964f38ce75.gif" },
                { title: "(GIF) Abstract Neon", url: "https://cdn.wallpapersafari.com/30/0/n0HOqk.gif" },
                { title: "(GIF) Orange Forest", url: "https://i.pinimg.com/originals/d7/33/34/d733345e4f11231904e7634a04439e21.gif" },
                { title: "BMW M4 Art", url: "https://applescoop.org/image/wallpapers/mac/bmw-m4-m-series-artwork-4k-01-11-2024-1730444935-hd-wallpaper.jpg" },
                { title: "Ferrari 499P", url: "https://pixelz.cc/wp-content/uploads/2024/01/ferrari-499p-le-mans-hypercar-uhd-4k-wallpaper.jpg" },
                { title: "Colorful Sky", url: "https://cdn.wallpapersafari.com/63/56/izoh9I.jpg" }
            ];

            const MEDIA_HISTORY_KEY = 'pomodoroMediaHistory';

            // --- Timer State ---
            const timerModes = {
                focus: 25 * 60,
                short: 5 * 60,
                long: 15 * 60,
            };
            
            // [SỬA LỖI] Khai báo lại các biến state bị thiếu
            let currentMode = 'focus';
            let timeRemaining = timerModes.focus;
            let isRunning = false;
            let timerId = null;
            let longBreakInterval = 4; // Long break after 4 focus sessions
            let focusCount = 0;

            // --- Audio (Tone.js) ---
            let alarmSynth = null;
            let noisePlayers = {};
            // [HẾT SỬA LỖI]

            // [ĐÃ SỬA] Thêm 3 loại âm thanh mới (oscillator)
            function setupAudio() {
                // Báo thức
                alarmSynth = new Tone.Synth().toDestination();

                // Tiếng ồn
                noisePlayers = {
                    white: new Tone.Noise("white").set({ volume: -Infinity }),
                    pink: new Tone.Noise("pink").set({ volume: -Infinity }),
                    brown: new Tone.Noise("brown").set({ volume: -Infinity }),
                    // [MỚI] Thêm Oscillators
                    // Đặt tần số thấp (C2 = 65.41 Hz) cho tiếng "hum"
                    sine: new Tone.Oscillator("C2", "sine").set({ volume: -Infinity }),
                    triangle: new Tone.Oscillator("C2", "triangle").set({ volume: -Infinity }),
                    sawtooth: new Tone.Oscillator("C2", "sawtooth").set({ volume: -Infinity }),
                };
                
                // [SỬA LỖI] Bắt đầu (start) TẤT CẢ các trình phát âm thanh (cả Noise và Oscillator)
                // Chúng sẽ chạy ngầm và chỉ được điều chỉnh âm lượng
                Object.values(noisePlayers).forEach(player => {
                    player.toDestination();
                    player.start();
                });
                
                console.log("Audio players initialized");
            }

            // Phải gọi Tone.start() sau khi người dùng tương tác
            async function startAudioContext() {
                if (Tone.context.state !== 'running') {
                    await Tone.start();
                    console.log('Audio context started');
                }
            }

            // --- Core Functions ---

            // Cập nhật đồng hồ và tiêu đề trang
            function updateDisplay() {
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                const displayString = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                
                timerDisplay.textContent = displayString;
                document.title = `${displayString} - ${currentMode.charAt(0).toUpperCase() + currentMode.slice(1)}`;
            }

            // Bắt đầu hẹn giờ
            function startTimer() {
                startAudioContext(); // Đảm bảo âm thanh được phép chạy
                isRunning = true;
                startPauseBtn.textContent = 'Pause';
                mainContent.classList.add('timer-active'); // [MỚI] Thu nhỏ UI
                
                timerId = setInterval(() => {
                    timeRemaining--;
                    updateDisplay();

                    if (timeRemaining <= 0) {
                        stopTimer();
                        playAlarm();
                        
                        // Tự động chuyển chế độ
                        if (currentMode === 'focus') {
                            focusCount++;
                            if (focusCount % longBreakInterval === 0) {
                                switchMode('long');
                            } else {
                                switchMode('short');
                            }
                        } else {
                            switchMode('focus');
                        }
                        // Tự động bắt đầu
                        startTimer();
                    }
                }, 1000);
            }

            // Dừng hẹn giờ
            function stopTimer() {
                clearInterval(timerId);
                timerId = null;
                isRunning = false;
                startPauseBtn.textContent = 'Start';
                mainContent.classList.remove('timer-active'); // [MỚI] Phục hồi UI
            }

            // Chơi âm báo thức
            function playAlarm() {
                startAudioContext(); // Đảm bảo
                if (alarmSynth) {
                    alarmSynth.triggerAttackRelease("C5", "8n", Tone.now());
                    alarmSynth.triggerAttackRelease("G5", "8n", Tone.now() + 0.2);
                }
            }

            // Chuyển chế độ (focus, short, long)
            function switchMode(mode) {
                if (isRunning) {
                    stopTimer();
                }
                
                currentMode = mode;
                timeRemaining = timerModes[mode];
                updateDisplay();
                mainContent.classList.remove('timer-active'); // [MỚI] Luôn phục hồi UI khi chuyển mode

                // Cập nhật giao diện nút tab
                tabButtons.forEach(btn => {
                    if (btn.id.startsWith(mode)) {
                        btn.classList.add('active');
                        btn.classList.remove('text-gray-300', 'hover:bg-white/10');
                    } else {
                        btn.classList.remove('active');
                        btn.classList.add('text-gray-300', 'hover:bg-white/10');
                    }
                });
            }
            
            // [ĐÃ SỬA] Logic bật/tắt và điều chỉnh âm lượng
            /**
             * Bật/tắt một âm thanh
             * @param {string} soundType - "white", "pink", "sine", v.v.
             */
            function toggleSound(soundType) {
                startAudioContext();
                const player = noisePlayers[soundType];
                const btn = document.querySelector(`.sound-btn[data-sound="${soundType}"]`);
                const slider = document.querySelector(`.volume-slider[data-sound="${soundType}"]`);

                if (btn.classList.contains('active')) {
                    // Đang active -> Tắt nó đi
                    player.volume.rampTo(-Infinity, 0.1);
                    slider.value = 0;
                    btn.classList.remove('active');
                } else {
                    // Đang tắt -> Bật lên (với âm lượng mặc định 75)
                    const defaultSliderVal = 75;
                    slider.value = defaultSliderVal;
                    setSoundVolume(soundType, defaultSliderVal); // Dùng hàm setVolume
                    btn.classList.add('active');
                }
            }

            /**
             * [MỚI] Đặt âm lượng dựa trên thanh trượt
             * @param {string} soundType 
             * @param {string|number} sliderValue - Giá trị từ 0 đến 100
             */
            function setSoundVolume(soundType, sliderValue) {
                const player = noisePlayers[soundType];
                const btn = document.querySelector(`.sound-btn[data-sound="${soundType}"]`);
                const value = parseInt(sliderValue, 10);

                if (value === 0) {
                    player.volume.rampTo(-Infinity, 0.1);
                    btn.classList.remove('active');
                } else {
                    // Chuyển đổi [1, 100] -> [-50, 0] dB
                    // (1 * 0.5) - 50 = -49.5 dB (rất nhỏ)
                    // (100 * 0.5) - 50 = 0 dB (tối đa)
                    const newVolumeDb = (value * 0.5) - 50;
                    player.volume.rampTo(newVolumeDb, 0.1);
                    btn.classList.add('active'); // Đảm bảo nút active khi có âm lượng
                }
            }


            // --- Media Player Functions ---

            /**
             * [MỚI] Hiển thị modal lỗi
             * @param {string} msg - Tin nhắn lỗi
             */
            function showError(msg) {
                errorMessage.textContent = msg;
                errorModal.classList.remove('hidden');
                errorModal.classList.add('flex');
            }

            /**
             * [MỚI] Ẩn modal lỗi
             */
            function hideError() {
                errorModal.classList.add('hidden');
                errorModal.classList.remove('flex');
            }

            /**
             * [ĐÃ SỬA] Chuyển đổi URL YouTube (mạnh mẽ hơn, hỗ trợ /shorts/)
             * @param {string} url - URL YouTube
             * @returns {string|null} URL nhúng hoặc null nếu không hợp lệ
             */
            function getYouTubeEmbedUrl(url) {
                let videoId = null;

                try {
                    // Thử phân tích URL đầy đủ (yêu cầu http/https)
                    const urlObj = new URL(url);
                    const hostname = urlObj.hostname;
                    const pathname = urlObj.pathname;

                    if (hostname === 'youtu.be') {
                        // Dạng: youtu.be/VIDEO_ID
                        videoId = pathname.split('/')[1];
                    } else if (hostname.includes('youtube.com') || hostname.includes('youtube-nocookie.com')) {
                        if (pathname.includes('/watch')) {
                            // Dạng: youtube.com/watch?v=VIDEO_ID
                            videoId = urlObj.searchParams.get('v');
                        } else if (pathname.includes('/shorts/')) {
                            // Dạng: youtube.com/shorts/VIDEO_ID
                            videoId = pathname.split('/shorts/')[1].split('?')[0];
                        } else if (pathname.includes('/embed/')) {
                            // Dạng: youtube.com/embed/VIDEO_ID
                            videoId = pathname.split('/embed/')[1].split('?')[0];
                        }
                    }
                } catch (error) {
                    // Lỗi xảy ra nếu URL không có (ví dụ: "www.youtube.com/...")
                    console.warn("URL constructor failed, trying regex.", error.message);
                }

                // Fallback bằng Regex cho các URL không đầy đủ hoặc các biến thể khác
                if (!videoId) {
                    const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|shorts)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/ ]{11})/;
                    const match = url.match(regex);
                    if (match && match[1]) {
                        videoId = match[1];
                    }
                }

                if (videoId) {
                    // Đảm bảo videoId sạch (11 ký tự)
                    videoId = videoId.substring(0, 11);
                    
                    // [ĐÃ SỬA] Gỡ bỏ tham số loop=1&playlist=...
                    // Chúng không hoạt động với live stream và có thể gây lỗi.
                    // Autoplay=1&mute=1 là đủ.
                    return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;
                }
                return null;
            }

            /**
             * [ĐÃ SỬA] Tải video và LƯU lịch sử
             */
            function loadMedia() {
                const url = mediaUrlInput.value.trim();
                if (!url) return; // Không làm gì nếu input rỗng
                
                const embedUrl = getYouTubeEmbedUrl(url);

                if (!embedUrl) {
                    showError("URL YouTube không hợp lệ. Vui lòng kiểm tra lại (ví dụ: https://www.youtube.com/watch?v=...).");
                    return;
                }

                // Tải video (tách hàm)
                loadYouTubeIframe(embedUrl);
                
                // [MỚI] Thêm vào lịch sử
                addMediaToHistory(url); 
                mediaUrlInput.value = ''; // Xóa input sau khi tải
            }

            /**
             * [ĐÃ SỬA] Tách riêng hàm tải Iframe (giờ tải vào Pop-up)
             * @param {string} embedUrl - URL nhúng đã được xử lý
             */
            function loadYouTubeIframe(embedUrl) {
                 // Xóa iframe cũ nếu có
                mediaPlayerContainer.innerHTML = '';

                // Tạo iframe mới
                const iframe = document.createElement('iframe');
                iframe.src = embedUrl;
                iframe.className = "w-full h-full"; // Cho iframe lấp đầy container
                iframe.frameBorder = "0";
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;

                mediaPlayerContainer.appendChild(iframe);
                
                // [MỚI] Hiển thị pop-up video
                videoPopupPanel.classList.remove('hidden');
                // Tự động đóng menu chọn (nếu đang mở)
                mediaPanel.classList.add('hidden');
                toggleMediaBtn.classList.remove('active');
            }
            
            /**
             * [MỚI] Hàm tải video từ Album/History
             * @param {string} url - URL gốc (chưa xử lý)
             */
            function loadMediaFromList(url) {
                const embedUrl = getYouTubeEmbedUrl(url);
                if (embedUrl) {
                    loadYouTubeIframe(embedUrl);
                    // [MỚI] Khi tải từ Album/History, cũng thêm vào lịch sử
                    addMediaToHistory(url);
                } else {
                    showError("Link đã lưu không hợp lệ.");
                }
            }
            
            // [MỚI] Lấy lịch sử từ localStorage
            function getMediaHistory() {
                try {
                    const history = localStorage.getItem(MEDIA_HISTORY_KEY);
                    return history ? JSON.parse(history) : [];
                } catch (e) {
                    return [];
                }
            }

            // [MỚI] Thêm vào lịch sử (đảm bảo không trùng lặp)
            function addMediaToHistory(url) {
                let history = getMediaHistory();
                // Xóa URL cũ nếu đã tồn tại để di chuyển nó lên đầu
                history = history.filter(item => item.url !== url);
                // Thêm vào đầu (mới nhất)
                history.unshift({ url: url }); // Chỉ lưu URL
                // Giữ 10 mục
                history = history.slice(0, 10); 
                localStorage.setItem(MEDIA_HISTORY_KEY, JSON.stringify(history));
                // Cập nhật UI (nếu tab history đang mở)
                if (mediaTabHistory && !mediaTabHistory.classList.contains('hidden')) {
                    populateMediaHistory();
                }
            }

            // [MỚI] Tạo UI cho Album
            function populateMediaAlbum() {
                mediaTabAlbum.innerHTML = '';
                MEDIA_ALBUM.forEach(item => {
                    const el = document.createElement('button');
                    el.className = 'media-list-item';
                    el.innerHTML = `<span class="code">${item.code}</span> ${item.title}`;
                    el.title = item.title;
                    el.onclick = () => loadMediaFromList(item.url);
                    mediaTabAlbum.appendChild(el);
                });
            }

            // [MỚI] Tạo UI cho History
            function populateMediaHistory() {
                mediaTabHistory.innerHTML = '';
                const history = getMediaHistory();
                if (history.length === 0) {
                    mediaTabHistory.innerHTML = '<span class="media-list-item" style="cursor: default; opacity: 0.7;">Chưa có lịch sử</span>';
                    return;
                }
                history.forEach(item => {
                    const el = document.createElement('button');
                    el.className = 'media-list-item';
                    el.textContent = item.url; // Hiển thị URL
                    el.title = item.url; // Hiển thị full URL khi hover
                    el.onclick = () => loadMediaFromList(item.url);
                    mediaTabHistory.appendChild(el);
                });
            }

            // --- [MỚI] Background Functions ---

            /**
             * [MỚI] Đặt nền (từ URL)
             */
            function setBackground(url) {
                if (!url) return;

                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    showError("URL hình ảnh không hợp lệ. Phải bắt đầu bằng http:// hoặc https://");
                    return;
                }

                // Tạo một ảnh trong bộ nhớ để kiểm tra xem nó có tải được không
                const img = new Image();
                img.onload = () => {
                    // Thành công!
                    bodyEl.style.setProperty('--custom-bg-image', `url(${url})`);
                    bodyEl.classList.add('custom-background');
                    localStorage.setItem('pomodoroBgUrl', url);
                    // Đóng panel sau khi đặt thành công
                    backgroundPanel.classList.add('hidden');
                    toggleBackgroundBtn.classList.remove('active');
                };
                img.onerror = () => {
                    // Thất bại!
                    showError("Không thể tải hình ảnh/GIF. Vui lòng kiểm tra lại URL.");
                };
                img.src = url; // Bắt đầu tải
            }
            
            /**
             * [MỚI] Khôi phục nền mặc định
             */
            function resetBackground() {
                bodyEl.style.removeProperty('--custom-bg-image');
                bodyEl.classList.remove('custom-background');
                localStorage.removeItem('pomodoroBgUrl');
                bgUrlInput.value = '';
            }
            
            /**
             * [MỚI] Tạo UI cho Album Nền
             */
            function populateBackgroundAlbum() {
                bgTabAlbum.innerHTML = '';
                BACKGROUND_ALBUM.forEach(item => {
                    const el = document.createElement('button');
                    el.className = 'bg-list-item';
                    el.innerHTML = `<span class="icon">${item.url.includes('gif') ? '🎞️' : '🖼️'}</span> ${item.title}`;
                    el.title = item.title;
                    el.onclick = () => setBackground(item.url);
                    bgTabAlbum.appendChild(el);
                });
            }

            // --- Event Listeners ---

            // Nút Start/Pause
            startPauseBtn.addEventListener('click', () => {
                if (isRunning) {
                    stopTimer();
                } else {
                    startTimer();
                }
            });

            // Nút chuyển chế độ
            focusBtn.addEventListener('click', () => switchMode('focus'));
            shortBreakBtn.addEventListener('click', () => switchMode('short'));
            longBreakBtn.addEventListener('click', () => switchMode('long'));

            // [ĐÃ SỬA] Nút âm thanh (Bật/Tắt)
            soundToggleButtons.forEach(btn => {
                btn.addEventListener('click', () => toggleSound(btn.dataset.sound));
            });

            // [MỚI] Thanh trượt âm lượng
            volumeSliders.forEach(slider => {
                // Dùng 'input' để cập nhật mượt mà khi kéo
                slider.addEventListener('input', (e) => setSoundVolume(e.target.dataset.sound, e.target.value));
            });

            // Nút tải media
            loadMediaBtn.addEventListener('click', loadMedia);

            // [MỚI] Nút đóng pop-up video
            closeVideoPopupBtn.addEventListener('click', () => {
                videoPopupPanel.classList.add('hidden');
            });

            // Nút đóng modal lỗi
            closeErrorModalBtn.addEventListener('click', hideError);

            // [ĐÃ SỬA] Event Listeners cho thanh Nav CỐ ĐỊNH (logic panel mới)
            const navButtons = [
                { btn: toggleSoundsBtn, panel: soundsPanel },
                { btn: toggleMediaBtn, panel: mediaPanel },
                { btn: toggleBackgroundBtn, panel: backgroundPanel } // [MỚI]
            ];

            navButtons.forEach(item => {
                item.btn.addEventListener('click', () => {
                    const wasHidden = item.panel.classList.contains('hidden');
                    
                    // Ẩn tất cả panels và hủy active tất cả nút
                    navButtons.forEach(i => {
                        i.panel.classList.add('hidden');
                        i.btn.classList.remove('active');
                    });
                    
                    // [MỚI] Tắt pop-up video nếu chúng ta mở một panel khác
                    if (item.btn !== toggleMediaBtn) {
                        videoPopupPanel.classList.add('hidden');
                    }

                    // Nếu nó đã bị ẩn, thì hiển thị nó và bật active
                    if (wasHidden) {
                        item.panel.classList.remove('hidden');
                        item.btn.classList.add('active');
                    }
                    // Nếu nó đang mở, bước trên đã đóng nó lại.
                });
            });

            // [MỚI] Event Listeners cho Media Tabs
            mediaTabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.dataset.tab;

                    // Ẩn tất cả nội dung
                    mediaTabContents.forEach(content => content.classList.add('hidden'));
                    
                    // Bỏ active tất cả nút
                    mediaTabButtons.forEach(btn => {
                        btn.classList.remove('active');
                        btn.classList.add('text-gray-300', 'hover:bg-white/10');
                    });

                    // Hiển thị nội dung và nút active
                    document.getElementById(`media-tab-${tabId}`).classList.remove('hidden');
                    button.classList.add('active');
                    button.classList.remove('text-gray-300', 'hover:bg-white/10');

                    // [MỚI] Tải lại nội dung khi nhấp vào tab (để cập nhật)
                    if (tabId === 'history') {
                        populateMediaHistory();
                    }
                });
            });

            // [MỚI] Event Listeners cho Background Tabs
            bgTabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.dataset.tab; // Sẽ là "custom" hoặc "album"

                    // Ẩn tất cả nội dung
                    bgTabContents.forEach(content => content.classList.add('hidden'));
                    
                    // Bỏ active tất cả nút
                    bgTabButtons.forEach(btn => {
                        btn.classList.remove('active');
                        btn.classList.add('text-gray-300', 'hover:bg-white/10');
                    });

                    // Hiển thị nội dung và nút active
                    // [SỬA LỖI] Logic ID đã được sửa
                    document.getElementById(`bg-tab-${tabId}`).classList.remove('hidden'); 
                    button.classList.add('active');
                    button.classList.remove('text-gray-300', 'hover:bg-white/10');
                });
            });


            // [MỚI] Event Listeners cho Đổi Nền
            setBgBtn.addEventListener('click', () => {
                setBackground(bgUrlInput.value.trim());
            });

            resetBgBtn.addEventListener('click', resetBackground);


            // --- Initialization ---
            setupAudio(); // Chuẩn bị âm thanh
            updateDisplay(); // Đặt hiển thị ban đầu
            populateMediaAlbum(); // [MỚI]
            populateMediaHistory(); // [MỚI]
            populateBackgroundAlbum(); // [MỚI]

            // [MỚI] Tải nền đã lưu khi khởi động
            const savedBgUrl = localStorage.getItem('pomodoroBgUrl');
            if (savedBgUrl) {
                setBackground(savedBgUrl); // Dùng hàm setBackground để xác thực
            }
            
            // [MỚI] Đặt tab media + bg mặc định là 'custom'
            // Dùng setTimeout 0 để đảm bảo nó chạy sau khi DOM render xong
            setTimeout(() => {
                 document.querySelector('.media-tab-btn[data-tab="custom"]').click();
                 // [SỬA LỖI] Đổi từ "bg-custom" -> "custom"
                 document.querySelector('.bg-tab-btn[data-tab="custom"]').click(); 
            }, 0);
        });
    </script>
</body>
</html>
